<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Railroad Models Layout Designer v.0144</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; }
        /* サイドバー */
        #sidebar { width: 250px; background: #2c3e50; color: white; overflow-y: auto; padding: 10px; }
        .rail-item { 
            background: #34495e; margin-bottom: 8px; padding: 10px; border-radius: 4px; 
            cursor: pointer; transition: background 0.2s; font-size: 14px;
        }
        .rail-item:hover { background: #1abc9c; }
        .rail-item-sub { font-size: 11px; color: #bdc3c7; display: block; margin-top: 4px; }
        
        /* メインエリア */
        /* メインエリアをスクロール可能にし、キャンバスを中央配置するための設定 */
        #main { 
            flex: 1; 
            background: #ecf0f1; 
            position: relative; 
            overflow: auto; /* 上下左右スクロールバーを表示 */
        }
        
        #canvas { 
            background: white; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
            display: block; 
            margin: 50px; /* キャンバス端の操作性を高めるための余白 */
        }
    </style>
</head>
    <body>
    
        <div id="sidebar">
            <h3 style="border-bottom: 1px solid #7f8c8d; padding-bottom: 5px;">パーツリスト</h3>
            <div id="rail-list"></div>
        </div>
    
        <div id="main">
            <canvas id="canvas"></canvas>
        </div>
    
        <script src="rails.js"></script>
    
        <script>
// --- 状態管理 ---
const layers = {
    rail: [] // キャンバス上のレール
};

const CANVAS_CONFIG = {
    width: 5000,
    height: 5000
};

// --- マウス操作ステート ---
let isDragging = false;
let draggedPart = null; 
let offsetX = 0;
let offsetY = 0;
let isSnapped = false;
let isCtrlPressed = false;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

/**
 * 初期化
 */
function init() {
    canvas.width = CANVAS_CONFIG.width;
    canvas.height = CANVAS_CONFIG.height;
    initCanvasEvents();
    initSidebar(); // サイドバーの生成を実行
    render();
}

/**
 * サイドバーの生成（2階層ツリー表示 / sNameのみ表示）
 */
function initSidebar() {
    const listContainer = document.getElementById('rail-list');
    if (!listContainer) return;
    listContainer.innerHTML = "";

    if (typeof railData === 'undefined') {
        listContainer.innerHTML = "<p style='color:red;'>rails.js not found</p>";
        return;
    }

    // データをツリー構造に整理 [シリーズ][役割]
    const tree = {};
    Object.entries(railData).forEach(([key, rail]) => {
        const series = rail.sSeries || "Unknown";
        const role = rail.sRole || "Other";
        if (!tree[series]) tree[series] = {};
        if (!tree[series][role]) tree[series][role] = [];
        
        // ドラッグ用IDを保持
        const railWithKey = { ...rail, sId: key };
        tree[series][role].push(railWithKey);
    });

    // 第1階層: シリーズ名
    Object.keys(tree).sort().forEach(seriesName => {
        const seriesDetails = document.createElement("details");
        seriesDetails.style.marginBottom = "5px";
        
        const seriesSummary = document.createElement("summary");
        seriesSummary.style.cursor = "pointer";
        seriesSummary.style.fontWeight = "bold";
        seriesSummary.style.padding = "3px";
        seriesSummary.style.background = "#1a252f";
        seriesSummary.textContent = "[+] " + seriesName;
        
        seriesDetails.appendChild(seriesSummary);

        // 第2階層: 役割 (Role)
        Object.keys(tree[seriesName]).sort().forEach(roleName => {
            const roleDetails = document.createElement("details");
            roleDetails.style.marginLeft = "10px";
            roleDetails.style.marginTop = "2px";
            
            const roleSummary = document.createElement("summary");
            roleSummary.style.cursor = "pointer";
            roleSummary.style.fontSize = "13px";
            roleSummary.style.color = "#1abc9c";
            roleSummary.textContent = "> " + roleName;
            
            roleDetails.appendChild(roleSummary);

            // パーツ一覧
            tree[seriesName][roleName].forEach(rail => {
                const div = document.createElement("div");
                div.className = "rail-item";
                div.style.marginLeft = "10px";
                div.style.cursor = "grab";
                div.draggable = true;
                // 表示を sName のみに限定
                div.textContent = rail.sName;
                
                div.ondragstart = (e) => {
                    e.dataTransfer.setData("text/plain", rail.sId);
                    e.dataTransfer.effectAllowed = "copy";
                };
                roleDetails.appendChild(div);
            });
            seriesDetails.appendChild(roleDetails);
        });

        // 開閉時の記号切り替え
        seriesDetails.addEventListener("toggle", () => {
            seriesSummary.textContent = (seriesDetails.open ? "[-] " : "[+] ") + seriesName;
        });

        listContainer.appendChild(seriesDetails);
    });
}
            
/**
 * 接点計算ロジック (横向き配置・水平基準対応版)
 * 既存の Junctions 配列の順序および計算式を維持しつつ、座標軸のみを現行の描画に合わせます。
 */
function getConnectorPoints(p, x, y, rotation) {
    const points = [];
    const rad = (rotation * Math.PI) / 180;
    const transform = (rx, ry, localAng) => {
        const tx = rx * Math.cos(rad) - ry * Math.sin(rad);
        const ty = rx * Math.sin(rad) + ry * Math.cos(rad);
        return { x: x + tx, y: y + ty, ang: (rotation + localAng + 360) % 360 };
    };

    if (p.sRole === "straight") {
        const halfLen = (p.nLength || 0) / 2;
        if (!p.bIsDouble) {
            points.push(transform(-halfLen, 0, 180)); 
            points.push(transform(halfLen, 0, 0));  
        } else {
            // 複線直線のロールバック（正常動作していた頃の形式）
            const halfGap = (p.nTrackGap || 33) / 2;
            points.push(transform(-halfLen, -halfGap, 180));
            points.push(transform(halfLen, -halfGap, 0));
            points.push(transform(-halfLen, halfGap, 180));
            points.push(transform(halfLen, halfGap, 0));
        }
    } else if (p.sRole === "curve" || p.sRole === "double-curve") {
        const halfDeg = (p.nAngle || 0) / 2;
        const halfRad = (halfDeg * Math.PI) / 180;
        
        if (p.sRole !== "double-curve") {
            const R = p.nRadius;
            const jX = R * Math.sin(halfRad);
            points.push(transform(-jX, 0, 180 + halfDeg)); 
            points.push(transform(jX, 0, 0 - halfDeg));
        } else {
            // 複線曲線の修正：描画側の centerY オフセットと完全に一致させる
            const rOuter = p.nRadius;
            const rInner = rOuter - (p.nTrackGap || 33);
            const jXOuter = rOuter * Math.sin(halfRad);
            const jXInner = rInner * Math.sin(halfRad);
            const jDiff = (rOuter - rInner) * Math.cos(halfRad);

            points.push(transform(-jXOuter, 0, 180 + halfDeg));     // 外左
            points.push(transform(jXOuter, 0, 0 - halfDeg));       // 外右
            points.push(transform(-jXInner, jDiff, 180 + halfDeg)); // 内左（jDiffを適用）
            points.push(transform(jXInner, jDiff, 0 - halfDeg));   // 内右（jDiffを適用）
        }
    }
    return points;
}
            
/**
 * 描画処理
 */
function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    layers.rail.forEach(part => drawPart(ctx, part));
}
            
/**
 * レール描画のエントリーポイント
 */
function drawPart(ctx, p) {
    ctx.save();
    
    // 基準点(中央)への座標変換
    ctx.translate(p.x, p.y);
    ctx.rotate((p.rotation * Math.PI) / 180);

    if (p.sRole === "straight") {
        drawStraightRail(ctx, p);
    } else if (p.sRole === "curve") {
        if (p.bIsDouble) {
            drawDoubleCurveRail(ctx, p);
        } else {
            drawCurveRail(ctx, p);
        }
    }

    // 基準点マーカーの描画制御
    if (p.sRole === "straight" || p.sRole === "curve") {
        if (isCtrlPressed) {
            const isDragged = (typeof draggedPart !== 'undefined' && p === draggedPart);
            
            ctx.beginPath();
            // 複線曲線かつ統合マーカー座標がある場合はその位置、そうでなければ(0,0)
            const markerX = (p.bIsDouble && p.combinedCenter) ? p.combinedCenter.x : 0;
            const markerY = (p.bIsDouble && p.combinedCenter) ? p.combinedCenter.y : 0;
            
            ctx.arc(markerX, markerY, 7.5, 0, Math.PI * 2); 
            
            ctx.fillStyle = isDragged ? "rgba(0, 86, 179, 1.0)" : "blue";
            ctx.fill();
            ctx.strokeStyle = isDragged ? "#003d80" : "#333";
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    }

    ctx.restore();
}

/**
 * 直線レール（単線・複線）の計算および描画
 */
function drawStraightRail(ctx, p) {
    const halfLen = p.nLength / 2;
    const halfView = p.nViewWidth / 2;
    const halfGauge = p.nGauge / 2;
    const isDouble = p.bIsDouble;
    const gap = p.nTrackGap || 33;
    const halfGap = gap / 2;

    const isDragged = (typeof draggedPart !== 'undefined' && p === draggedPart);
    const mainColor = p.sColor || '#333';

    // 1. 道床（バラスト）の描画
    const originalAlpha = ctx.globalAlpha; // 現在の透明度を保存
    ctx.globalAlpha = 0.3;                 // 半透明に設定（0.3 = 30%）
    ctx.fillStyle = p.sColor || '#999';    // 色名(Green等)をそのまま代入
    
    ctx.strokeStyle = isDragged ? (typeof isSnapped !== 'undefined' && isSnapped ? '#007bff' : '#ff4757') : mainColor;
    ctx.lineWidth = isDragged ? 3 : 1;

    ctx.beginPath();
    ctx.rect(-halfLen, -halfView, p.nLength, p.nViewWidth);
    ctx.fill();
    
    ctx.globalAlpha = originalAlpha;       // 透明度を元に戻す（枠線とレール描画のため）
    ctx.stroke();

    // 2. レールの描画
    ctx.beginPath();
    ctx.strokeStyle = mainColor;
    ctx.lineWidth = 1;

    // 軌道のオフセット位置を決定
    const trackOffsets = isDouble ? [-halfGap, halfGap] : [0];

    trackOffsets.forEach(offsetY => {
        // 各軌道の上側レール
        ctx.moveTo(-halfLen, offsetY - halfGauge);
        ctx.lineTo(halfLen, offsetY - halfGauge);
        // 各軌道の下側レール
        ctx.moveTo(-halfLen, offsetY + halfGauge);
        ctx.lineTo(halfLen, offsetY + halfGauge);
    });
    ctx.stroke();

    // 3. 吸着点（Junction）の座標更新（相対座標）
    // junctionCountに基づいて配列を再生成
    if (p.junctionCount) {
        const jValOuter = rOuter * Math.sin(halfAngle);
        const jValInner = rInner * Math.sin(halfAngle);
        // centerX/Y の定義に基づき、上端（外側）を 0 とした時の内側の相対位置を算出
        const jDiff = (rOuter - rInner) * Math.cos(halfAngle);
    
        p.junctions = [
            { x: -jValOuter, y: 0 },      // 外側左
            { x: jValOuter, y: 0 },       // 外側右
            { x: -jValInner, y: jDiff },  // 内側左（yをjDiffに）
            { x: jValInner, y: jDiff }   // 内側右（yをjDiffに）
        ];
        p.junctions = p.junctions.slice(0, p.junctionCount);
    }
}

/**
 * 曲線レールの計算および描画（単線専用）
 */
function drawDoubleCurveRail(ctx, p) {
    const rOuter = p.nRadius;
    const nGap = p.nTrackGap || 33;
    const rInner = rOuter - nGap;
    const angleDeg = p.nAngle;
    const angleRad = (angleDeg * Math.PI) / 180;
    const halfAngle = angleRad / 2;
    const halfGauge = (p.nGauge || 9) / 2;
    // 見た目の太さをタイトにする修正のみ維持
    const halfView = (p.nViewWidth / 4) || 6.25; 

    const mainColor = p.sColor || '#333';
    const isDragged = (typeof draggedPart !== 'undefined' && p === draggedPart);
    
    const centerX = 0;
    const centerY = -rOuter * Math.cos(halfAngle);
    const startAngle = (Math.PI / 2) - halfAngle;
    const endAngle = (Math.PI / 2) + halfAngle;

    // 1. 道床（バラスト）
    ctx.beginPath();
    ctx.arc(centerX, centerY, rOuter + halfView, startAngle, endAngle);
    ctx.arc(centerX, centerY, rInner - halfView, endAngle, startAngle, true);
    ctx.closePath();
    const originalAlpha = ctx.globalAlpha;
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = p.sColor || '#999';
    ctx.fill();
    ctx.globalAlpha = originalAlpha;
    
    ctx.strokeStyle = isDragged ? (typeof isSnapped !== 'undefined' && isSnapped ? '#007bff' : '#ff4757') : mainColor;
    ctx.lineWidth = isDragged ? 3 : 1;
    ctx.stroke();

    // 2. レール（4本）
    ctx.lineWidth = 1;
    ctx.strokeStyle = mainColor;
    [rOuter + halfGauge, rOuter - halfGauge, rInner + halfGauge, rInner - halfGauge].forEach(r => {
        ctx.beginPath();
        ctx.arc(centerX, centerY, r, startAngle, endAngle);
        ctx.stroke();
    });

    // 3. Junctions（接点データ）の同期
    if (p.junctionCount) {
        const jValOuter = rOuter * Math.sin(halfAngle);
        const jValInner = rInner * Math.sin(halfAngle);
        // 吸着しない原因だった Y 座標の不一致を、明示的な jDiff で解消
        const jDiff = (rOuter - rInner) * Math.cos(halfAngle);

        p.junctions = [
            { x: -jValOuter, y: 0 },
            { x: jValOuter, y: 0 },
            { x: -jValInner, y: jDiff },
            { x: jValInner, y: jDiff }
        ];
        p.junctions = p.junctions.slice(0, p.junctionCount);
        p.innerCenter = { x: 0, y: 0 }; 
    }
}

/**
 * 複線曲線レールの描画（横向き・タイトな道床幅・全接点復活版）
 */
function drawDoubleCurveRail(ctx, p) {
    const rOuter = p.nRadius;
    const nGap = p.nTrackGap || 33; // 複線間隔
    const rInner = rOuter - nGap;   // 内側レールの半径を確実に算出
    
    const angleDeg = p.nAngle;
    const angleRad = (angleDeg * Math.PI) / 180;
    const halfAngle = angleRad / 2;
    const halfGauge = (p.nGauge || 9) / 2;
    
    // 【ユーザー修正採用】複線用に道床のハミ出しを半分に抑える
    const halfView = (p.nViewWidth / 4) || 0; 

    const mainColor = p.sColor || '#333';
    const isDragged = (typeof draggedPart !== 'undefined' && p === draggedPart);
    
    const centerX = 0;
    const centerY = -rOuter * Math.cos(halfAngle);
    const startAngle = (Math.PI / 2) - halfAngle;
    const endAngle = (Math.PI / 2) + halfAngle;

    // 1. 道床（バラスト）
    ctx.beginPath();
    ctx.arc(centerX, centerY, rOuter + halfView, startAngle, endAngle);
    ctx.arc(centerX, centerY, rInner - halfView, endAngle, startAngle, true);
    ctx.closePath();
    
    const originalAlpha = ctx.globalAlpha;
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = p.sColor || '#999';
    ctx.fill();
    ctx.globalAlpha = originalAlpha;
    
    ctx.strokeStyle = isDragged ? (typeof isSnapped !== 'undefined' && isSnapped ? '#007bff' : '#ff4757') : mainColor;
    ctx.lineWidth = isDragged ? 3 : 1;
    ctx.stroke();

    // 2. レールの描画（4本すべて）
    ctx.lineWidth = 1;
    ctx.strokeStyle = mainColor;
    // 外側
    ctx.beginPath(); ctx.arc(centerX, centerY, rOuter + halfGauge, startAngle, endAngle); ctx.stroke();
    ctx.beginPath(); ctx.arc(centerX, centerY, rOuter - halfGauge, startAngle, endAngle); ctx.stroke();
    // 内側
    ctx.beginPath(); ctx.arc(centerX, centerY, rInner + halfGauge, startAngle, endAngle); ctx.stroke();
    ctx.beginPath(); ctx.arc(centerX, centerY, rInner - halfGauge, startAngle, endAngle); ctx.stroke();

    // 3. 接続点（Junctions）の復活
    if (p.junctionCount) {
        // 各半径に基づいた正確なX座標（端点の位置）を計算
        const jValOuter = rOuter * Math.sin(halfAngle);
        const jValInner = rInner * Math.sin(halfAngle);
        
        // 横向き配置なので Y はすべて 0 で統一（吸着バグ防止）
        p.junctions = [
            { x: -jValOuter, y: 0 }, // 0: 外側左
            { x: jValOuter, y: 0 },  // 1: 外側右
            { x: -jValInner, y: 0 }, // 2: 内側左（復活）
            { x: jValInner, y: 0 }   // 3: 内側右（復活）
        ];
        
        // junctionCount に基づいて切り出し（通常は4）
        p.junctions = p.junctions.slice(0, p.junctionCount);
        
        // 回転基準点
        p.innerCenter = { x: 0, y: 0 }; 
    }
}
            
/**
 * パーツの選択判定
 * 実際のプロパティ名 (p.nRot, p.nRad, p.nDeg) に準拠
 */
function isPointInPart(mouseX, mouseY, p) {
    const ctx = canvas.getContext('2d');
    ctx.save();

    // 1. 実データ(rotation)に基づいた座標変換
    const dx = mouseX - p.x;
    const dy = mouseY - p.y;
    // rotation プロパティをそのまま使用
    const rad = -((p.rotation || 0) * Math.PI / 180); 
    
    // マウス位置をレールのローカル座標に変換
    const localX = dx * Math.cos(rad) - dy * Math.sin(rad);
    const localY = dx * Math.sin(rad) + dy * Math.cos(rad);

    ctx.beginPath();
    
    // 2. sRole に基づいたパス作成
    if (p.sRole === 'straight') {
        // 直線：nLength と nViewWidth を使用
        const halfLen = (p.nLength || 0) / 2;
        const halfView = (p.nViewWidth || 25) / 2;
        ctx.rect(-halfLen, -halfView, p.nLength, p.nViewWidth);
    } 
    else if (p.nRadius > 0) {
        // 曲線・複線：描画関数 drawCurveRail と同じ座標系に合わせる
        const R = p.nRadius;
        const angleRad = (p.nAngle * Math.PI) / 180;
        const halfAngle = angleRad / 2;
        const halfView = (p.nViewWidth || 25) / 2;

        // 【修正】中心点をY軸方向へ配置（横向き円弧の描画に合わせる）
        const centerX = 0;
        const centerY = -R * Math.cos(halfAngle); 
        
        // 【修正】角度基準を90度シフト（下側を中心に描画）
        const startAngle = (Math.PI / 2) - halfAngle;
        const endAngle = (Math.PI / 2) + halfAngle;

        if (p.sRole !== 'double-curve') {
            // 単線曲線
            ctx.arc(centerX, centerY, R + halfView, startAngle, endAngle);
            ctx.arc(centerX, centerY, R - halfView, endAngle, startAngle, true);
        } else {
            // 複線曲線
            const gap = p.nTrackGap || 33;
            const rInner = R - gap;
            ctx.arc(centerX, centerY, R + halfView, startAngle, endAngle);
            ctx.arc(centerX, centerY, rInner - halfView, endAngle, startAngle, true);
        }
    } else {
        // ポイント等：その他は中心付近 30px
        ctx.arc(0, 0, 30, 0, Math.PI * 2);
    }
    
    ctx.closePath();

    // 3. 判定実行
    const isHit = ctx.isPointInPath(localX, localY);

    ctx.restore();
    return isHit;
}
            
/**
 * イベント処理
 */
function initCanvasEvents() {
    // キャンバスへのドロップでパーツ追加
    canvas.ondragover = (e) => e.preventDefault();
    canvas.ondrop = (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const sId = e.dataTransfer.getData("text/plain");
        if (railData[sId]) {
            const newPart = { 
                ...railData[sId], 
                id: Date.now(), 
                x: e.clientX - rect.left, 
                y: e.clientY - rect.top, 
                rotation: 0 
            };
            layers.rail.push(newPart);
            render();
        }
    };

// キャンバス上のドラッグ操作（mousedown内）
canvas.onmousedown = function(e) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    for (let i = layers.rail.length - 1; i >= 0; i--) {
        const p = layers.rail[i];

        console.log("クリック判定中のパーツ:", p);
        
        // isPointInPart の戻り値が正しければ、既存のドラッグ処理をそのまま実行
        if (isPointInPart(mouseX, mouseY, p)) {
            draggedPart = p;
            isDragging = true;
            
            offsetX = mouseX - p.x;
            offsetY = mouseY - p.y;
            
            // 機能を削らず、既存の重なり順変更を維持
            layers.rail.splice(i, 1);
            layers.rail.push(draggedPart);
            
            render(); 
            break;
        }
    }
};

canvas.onmousemove = function(e) {
    if (!isDragging || !draggedPart) return;
    const rect = canvas.getBoundingClientRect();
    
    // マウス位置に合わせてパーツを移動（基本位置）
    draggedPart.x = (e.clientX - rect.left) - offsetX;
    draggedPart.y = (e.clientY - rect.top) - offsetY;

    let minDistance = 20;
    let targetPoint = null; // 座標だけでなくangも保持するため名称変更
    let myPointIdx = -1;

    // 現在の座標・角度における自分の接点を取得
    const myPoints = getConnectorPoints(draggedPart, draggedPart.x, draggedPart.y, draggedPart.rotation);

    // 全てのパーツに対して一番近い接点を探索
    layers.rail.forEach(t => {
        if (t === draggedPart) return;
        const tPoints = getConnectorPoints(t, t.x, t.y, t.rotation);
        myPoints.forEach((p1, i) => {
            tPoints.forEach(p2 => {
                const d = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                if (d < minDistance) { 
                    minDistance = d; 
                    myPointIdx = i; 
                    targetPoint = p2; // 相手の接点(angプロパティを含む)を保存
                }
            });
        });
    });

    if (targetPoint) {
        // --- 1. 角度の吸着 ---
        // 相手の向き(targetPoint.ang)の180度反対が、自分の向くべき目標角度
        const targetAng = (targetPoint.ang + 180) % 360;
        
        // 自分の現在のコネクタ角度(myPoints[myPointIdx].ang)との差分
        let diffAng = targetAng - myPoints[myPointIdx].ang;
        
        // 最短距離で回転させるための補正（一番近い回転方向を選ぶ）
        while (diffAng > 180) diffAng -= 360;
        while (diffAng < -180) diffAng += 360;

        // 現在の rotation に最短の差分を足して更新
        draggedPart.rotation = (draggedPart.rotation + diffAng + 360) % 360;

        // --- 2. 座標の吸着 ---
        // 角度が変わったので、新しい rotation に基づいて接点相対位置を再取得して固定
        const relPoints = getConnectorPoints(draggedPart, 0, 0, draggedPart.rotation);
        draggedPart.x = targetPoint.x - relPoints[myPointIdx].x;
        draggedPart.y = targetPoint.y - relPoints[myPointIdx].y;
        
        isSnapped = true;
    } else { 
        isSnapped = false; 
    }
    render();
};

    window.onmouseup = () => { isDragging = false; draggedPart = null; render(); };
}

// Rキー回転
window.onkeydown = (e) => {
    if (e.key.toLowerCase() === 'r') {
        const t = draggedPart || layers.rail[layers.rail.length-1];
        if (t) { t.rotation = (t.rotation + 22.5) % 360; render(); e.preventDefault(); }
    }
};

window.addEventListener('keydown', (e) => {
    if (e.key === 'Control') {
        isCtrlPressed = true;
        console.log("Ctrl Pressed: ", isCtrlPressed);
        render();
    }
});

window.addEventListener('keyup', (e) => {
    if (e.key === 'Control') {
        isCtrlPressed = false;
        render();
    }
});
            
// 起動
init();
       
        </script>
    </body>
