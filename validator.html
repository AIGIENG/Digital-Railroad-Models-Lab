<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Rail Data Validator</title>
    <style>
        .error { color: red; font-weight: bold; }
        .success { color: green; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 5px; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>レールデータ検証結果</h1>
    <div id="results"></div>

    <script src="rails.js"></script>
    <script>
        const SCHEMA = {
            required: ['sName', 'sProductCode', 'sMaker', 'sSeries', 'sRole', 'nLength', 'nRadius', 'nAngle', 
                       'bIsDouble', 'nTrackGap', 'nJunctionCount', 'sDirection', 'sKant', 'nViewWidth', 
                       'nHeight', 'nGauge', 'sColor', 'sComment'],
            numeric: ['nLength', 'nRadius', 'nAngle', 'nTrackGap', 'nViewWidth', 'nHeight', 'nGauge'],
            validKant: ['none', 'both', 'left', 'right']
        };

        const resultsDiv = document.getElementById('results');

        function validateData(data) {
            let html = '<ul>';
            let errorCount = 0;
            
            Object.keys(data).forEach(key => {
                const item = data[key];
                let errors = [];

                SCHEMA.required.forEach(field => {
                    if (item[field] === undefined) errors.push(`'${field}' が不足`);
                });

                SCHEMA.numeric.forEach(field => {
                    if (item[field] !== undefined && typeof item[field] !== 'number') {
                        errors.push(`'${field}' は数値が必要`);
                    }
                });

                if (item.sKant && !SCHEMA.validKant.includes(item.sKant)) {
                    errors.push(`sKantの値 '${item.sKant}' が不正`);
                }

                if (errors.length > 0) {
                    html += `<li class="error">[ERROR] ${key}: ${errors.join(', ')}</li>`;
                    errorCount++;
                } else {
                    html += `<li class="success">[OK] ${key}: 正常</li>`;
                }
            });

            html += '</ul>';
            
            // 正常時のメッセージ表示ロジックを復旧
            if (errorCount === 0) {
                html = '<p class="success">すべてのデータが正常です。</p>' + html;
            } else {
                html = `<p class="error">${errorCount} 件のエラーが見つかりました。</p>` + html;
            }
            resultsDiv.innerHTML = html;
        }

        validateData(railData);
    </script>
</body>
</html>
