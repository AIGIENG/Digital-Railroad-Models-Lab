<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Railroad Model Layout Designer v0.59.041f3</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #333; color: white; font-family: sans-serif; overflow: hidden; }
        #sidebar { width: 320px; background: #222; border-right: 1px solid #444; overflow-y: auto; padding: 10px; user-select: none; }
        #canvas-container { flex-grow: 1; overflow: auto; background: #444; position: relative; }
        canvas { background: white; display: block; cursor: crosshair; }
        
        /* パーツリストのデザイン */
        .maker-title { background: #444; padding: 10px; margin-top: 15px; font-weight: bold; border-left: 4px solid #007bff; cursor: pointer; }
        .cat-title { background: #333; padding: 8px 15px; font-size: 0.9em; color: #ccc; cursor: pointer; border-bottom: 1px solid #444; }
        .part-item { padding: 8px 20px; font-size: 0.85em; cursor: grab; border-bottom: 1px solid #333; transition: 0.2s; }
        .part-item:hover { background: #333; color: #fff; }
        .part-item:active { cursor: grabbing; }
        .hidden { display: none; }

        /* ガイド表示 */
        #drop-guide {
            position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7);
            padding: 10px 20px; border-radius: 5px; font-size: 0.8em; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="margin:5px;">Parts List</h3>
    <p style="font-size:0.7em; color: #888;">ドラッグしてキャンバスへ配置</p>
    <div id="parts-tree"></div>
</div>

<div id="canvas-container">
    <canvas id="mainCanvas"></canvas>
</div>

<div id="drop-guide">
    ドラッグ：配置 / 右クリック：回転 / 左右ドラッグ：移動
</div>

<script src="rails.js"></script>
<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 2400; 
canvas.height = 2400;

let layers = { rail: [] };
let selectedPart = null;
let isDragging = false;
let dragOffset = { x: 0, y: 0 };
let draggedTemplate = null; // 現在ドラッグ中のテンプレート

<script type="module">
    // rails.js から RAIL_DATA をインポート
    import { RAIL_DATA } from './rails.js';

    function validateRailData() {
        const errorMessages = [];
        
        RAIL_DATA.forEach((rail, index) => {
            const lineInfo = `[${index + 1}行目: ${rail.name || "名称不明"}]`;
            
            if (rail.radius !== undefined && !Array.isArray(rail.radius)) {
                errorMessages.push(`${lineInfo} radiusが配列 [ ] で囲まれていません。`);
            }
            
            if (!rail.name) errorMessages.push(`${lineInfo} nameが定義されていません。`);
            if (!rail.type) errorMessages.push(`${lineInfo} typeが定義されていません。`);
        });

        if (errorMessages.length > 0) {
            const alertDiv = document.createElement("div");
            alertDiv.style = "position:fixed; top:10px; right:10px; background:rgba(255,0,0,0.8); color:white; padding:15px; border-radius:5px; z-index:9999; font-size:12px; max-height:80vh; overflow-y:auto; line-height:1.5;";
            alertDiv.innerHTML = "<strong>【レール定義エラー】</strong><br>" + errorMessages.join("<br>");
            document.body.appendChild(alertDiv);
        }
    }

    // モジュールとして読み込まれた後は、DOMContentLoadedを待たずとも実行可能です
    validateRailData();
    
// 1. サイドバーの構築 (Drag startイベントを追加)
function initSidebar() {
    const tree = document.getElementById('parts-tree');
    tree.innerHTML = ""; 

    for (const maker in railData) {
        const mDiv = document.createElement('div');
        mDiv.className = 'maker-title';
        mDiv.textContent = "[+] " + maker;
        tree.appendChild(mDiv);

        const mCont = document.createElement('div');
        mCont.className = 'hidden';
        tree.appendChild(mCont);

        mDiv.onclick = () => {
            mCont.classList.toggle('hidden');
            mDiv.textContent = (mCont.classList.contains('hidden') ? "[+] " : "[-] ") + maker;
        };

        for (const cat in railData[maker]) {
            const cDiv = document.createElement('div');
            cDiv.className = 'cat-title';
            cDiv.textContent = "> " + cat;
            mCont.appendChild(cDiv);

            const cCont = document.createElement('div');
            cCont.className = 'hidden';
            mCont.appendChild(cCont);

            cDiv.onclick = (e) => {
                e.stopPropagation();
                cCont.classList.toggle('hidden');
            };

            railData[maker][cat].forEach(part => {
                const pDiv = document.createElement('div');
                pDiv.className = 'part-item';
                pDiv.draggable = true; // ドラッグ可能にする
                pDiv.textContent = part.name + (part.desc ? ` (${part.desc})` : "");

                // ドラッグ開始時にデータを保持
                pDiv.ondragstart = (e) => {
                    draggedTemplate = part;
                    e.dataTransfer.setData("text/plain", part.name);
                };

                cCont.appendChild(pDiv);
            });
        }
    }
}

// 2. 配置処理 (任意の座標に配置)
function addPartAt(template, x, y) {
    if (!template) return;
    const newPart = JSON.parse(JSON.stringify(template));
    if (newPart.joints === undefined) {
        newPart.joints = 2;
    }
    newPart.x = x;
    newPart.y = y;
    newPart.rotation = 0;
    if (!newPart.std) newPart.std = "KATO_N";

    layers.rail.push(newPart);
    selectedPart = newPart;
    render();
}

// 3. キャンバスのドラッグ＆ドロップ受け入れ
canvas.ondragover = (e) => e.preventDefault();
canvas.ondrop = (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    if (draggedTemplate) {
        addPartAt(draggedTemplate, x, y);
        draggedTemplate = null;
    }
};

// 4. 描画
function drawArc(ctx, r, a, w, fill, off = 0) {
    const rad = a * Math.PI / 180;
    const centerX = 0;
    const centerY = r; 
    const currentR = r + off;

    ctx.beginPath();
    if (fill) {
        ctx.arc(centerX, centerY, currentR + w/2, -Math.PI/2, -Math.PI/2 + rad);
        ctx.arc(centerX, centerY, currentR - w/2, -Math.PI/2 + rad, -Math.PI/2, true);
        ctx.closePath();
        ctx.fill();
    } else {
        // ハイライト線などの場合
        ctx.arc(centerX, centerY, currentR, -Math.PI/2, -Math.PI/2 + rad);
        // fillでない場合はclosePathしない
    }
    ctx.stroke();
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    layers.rail.forEach(part => {
        const std = STANDARDS[part.std] || { gauge: 9, defWidth: 25, color: "#aaa", edge: "#888" };
        const type = part.type || "";
        
        ctx.save();
        ctx.translate(part.x, part.y);
        ctx.rotate(part.rotation * Math.PI / 180);

        // --- ポイントレールの描画 (既存ロジックから独立) ---
        if (type.startsWith("point")) {
            const pW = part.width || std.defWidth;
            const pL = part.length || 140;
            const pA = part.angle || 15;
            const pSide = type.endsWith("-L") ? -1 : 1; // 左分岐なら-1, 右分岐なら1
            
            // radiusを安全に取得（配列前提）
            const pRadii = Array.isArray(part.radius) ? part.radius : [part.radius];
            const pR = pRadii[0] || 481;

            ctx.fillStyle = part.color || std.color;
            ctx.strokeStyle = part.edge || std.edge;
            ctx.lineWidth = 1;

            // 1. 直線側の道床
            ctx.fillRect(0, -pW / 2, pL, pW);
            ctx.strokeRect(0, -pW / 2, pL, pW);

            // 2. 分岐側の道床 (円弧)
            ctx.save();
            ctx.translate(0, pSide * pR);
            const startAng = (pSide === -1 ? 0.5 : -0.5) * Math.PI;
            const endAng = startAng + (pSide * pA * Math.PI / 180);
            
            ctx.beginPath();
            ctx.arc(0, 0, pR, startAng, endAng, pSide === -1);
            ctx.lineWidth = pW;
            ctx.strokeStyle = ctx.fillStyle;
            ctx.stroke();

            // 分岐道床の縁取り
            ctx.lineWidth = 1;
            ctx.strokeStyle = part.edge || std.edge;
            ctx.beginPath();
            ctx.arc(0, 0, pR - pW / 2, startAng, endAng, pSide === -1);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, pR + pW / 2, startAng, endAng, pSide === -1);
            ctx.stroke();
            ctx.restore();

            // 3. レール描画 (直線と分岐の両方)
            ctx.strokeStyle = "#999"; 
            ctx.lineWidth = 2;
            const g = std.gauge / 2;
            // 直線レール
            ctx.beginPath();
            ctx.moveTo(0, -g); ctx.lineTo(pL, -g);
            ctx.moveTo(0, g); ctx.lineTo(pL, g);
            ctx.stroke();
            // 分岐レール
            ctx.save();
            ctx.translate(0, pSide * pR);
            ctx.beginPath();
            ctx.arc(0, 0, pR - g, startAng, endAng, pSide === -1);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, pR + g, startAng, endAng, pSide === -1);
            ctx.stroke();
            ctx.restore();
        } 
        // --- 既存の曲線レール描画 (変更なし) ---
        else if (type === "curve") {
            const radii = Array.isArray(part.radius) ? part.radius : [part.radius];
            radii.forEach(r => {
                drawArc(ctx, r, part.angle, part.width || std.defWidth, true, 0);
            });
        } 
        // --- 既存の直線レール描画 (変更なし) ---
        else {
            const w = part.width || std.defWidth;
            const L = part.length || 140;
            ctx.fillStyle = part.color || std.color;
            ctx.strokeStyle = part.edge || std.edge;
            ctx.fillRect(0, -w / 2, L, w);
            ctx.strokeRect(0, -w / 2, L, w);
        }

        // 選択表示
        if (selectedPart === part) {
            ctx.fillStyle = "rgba(255, 165, 0, 0.5)";
            const markerL = (type.startsWith("point") ? part.length : (part.length || 140)) || 140;
            ctx.fillRect(0, - (part.width || std.defWidth) / 2, markerL, part.width || std.defWidth);
        }
        ctx.restore();
    });
}
    
    function drawArc(ctx, r, a, w, fill, off = 0) {
    const rad = a * Math.PI / 180;
    const centerX = 0;
    const centerY = r; // 中心を y 方向に半径分オフセット
    const currentR = r + off;
    ctx.beginPath();
    if (fill) {
        ctx.arc(centerX, centerY, currentR + w/2, -Math.PI/2, -Math.PI/2 + rad);
        ctx.arc(centerX, centerY, currentR - w/2, -Math.PI/2 + rad, -Math.PI/2, true);
        ctx.closePath();
        ctx.fill();
    } else {
        ctx.arc(centerX, centerY, currentR, -Math.PI/2, -Math.PI/2 + rad);
    }
    ctx.stroke();
}

function getJoints(p) {
    const std = STANDARDS[p.std] || { space: 33 };
    const rad = p.rotation * Math.PI / 180;
    const joints = [];

    const radii = Array.isArray(p.radius) ? p.radius : [p.radius];
    const isDouble = p.isDouble || radii.length > 1;
    const space = std.space || 33;

    // 複線の場合、各レール芯のオフセットを定義
    let offsets = [0];
    if (isDouble) {
        if (p.type === "curve" && Array.isArray(p.radius)) {
            const avgR = p.radius.reduce((a, b) => a + b) / p.radius.length;
            offsets = p.radius.map(r => r - avgR);
        } else {
            offsets = [-space / 2, space / 2];
        }
    }

    offsets.forEach(off => {
        const sx = p.x + off * Math.cos(rad + Math.PI / 2);
        const sy = p.y + off * Math.sin(rad + Math.PI / 2);
        joints.push({ x: sx, y: sy, angle: (p.rotation + 180) % 360, type: "start" });

        let ex, ey, ea;
        if (p.type === "curve") {
            const arad = p.angle * Math.PI / 180;
            const avgR = Array.isArray(p.radius) ? (p.radius.reduce((a, b) => a + b) / p.radius.length) : p.radius;
            const r = avgR + off;
            const cx = p.x - Math.sin(rad) * avgR;
            const cy = p.y + Math.cos(rad) * avgR;
            ex = cx + Math.sin(rad + arad) * r;
            ey = centerY = cy - Math.cos(rad + arad) * r;
            ea = (p.rotation + p.angle) % 360;
        } else {
            const len = p.length || 50;
            ex = sx + len * Math.cos(rad);
            ey = sy + len * Math.sin(rad);
            ea = p.rotation;
        }
        joints.push({ x: ex, y: ey, angle: (ea + 360) % 360, type: "end" });
    });

    return joints;
}
    
// 5. マウス操作
// グローバル変数または適切なスコープに定義

// 右クリックメニューによる誤作動を防止（推奨）
canvas.oncontextmenu = (e) => e.preventDefault();

canvas.onmousedown = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    selectedPart = null;
    // 逆順ループで重なりが上のものを優先選択
    for (let i = layers.rail.length - 1; i >= 0; i--) {
        const p = layers.rail[i];
        const dx = mx - p.x;
        const dy = my - p.y;
        const angle = -p.rotation * Math.PI / 180;
        const rx = dx * Math.cos(angle) - dy * Math.sin(angle);
        const ry = dx * Math.sin(angle) + dy * Math.cos(angle);

        const w = p.width || 25;
        let isHit = false;
        let centerX, centerY;

        if (p.type === "curve") {
            const radii = Array.isArray(p.radius) ? p.radius : [p.radius];
            const avgR = radii.reduce((a, b) => a + b) / radii.length;
            const dist = Math.hypot(rx, ry - avgR);
            const a = (Math.atan2(rx, avgR - ry) * 180 / Math.PI);
            
            if (dist >= avgR - w/2 && dist <= avgR + w/2 && a >= 0 && a <= p.angle) {
                isHit = true;
                const arad = (p.angle / 2) * Math.PI / 180;
                const localCX = Math.sin(arad) * avgR;
                const localCY = avgR - Math.cos(arad) * avgR;
                
                const rad = p.rotation * Math.PI / 180;
                centerX = p.x + localCX * Math.cos(rad) - localCY * Math.sin(rad);
                centerY = p.y + localCX * Math.sin(rad) + localCY * Math.cos(rad);
            }
        } else {
            const len = p.length || 50;
            if (rx >= 0 && rx <= len && ry >= -w/2 && ry <= w/2) {
                isHit = true;
                const localCX = len / 2;
                const rad = p.rotation * Math.PI / 180;
                centerX = p.x + localCX * Math.cos(rad);
                centerY = p.y + localCX * Math.sin(rad);
            }
        }

        if (isHit) {
            selectedPart = p;
            isDragging = true;
            dragOffset.x = mx - centerX;
            dragOffset.y = my - centerY;
            break;
        }
    }
    render();
};

canvas.onmousemove = (e) => {
    if (isDragging && selectedPart) {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        // マウス位置からオフセットを引き、レールの理想的な「中心座標」を求める
        const targetCX = mx - dragOffset.x;
        const targetCY = my - dragOffset.y;

        let localCX, localCY;
        if (selectedPart.type === "curve") {
            const radii = Array.isArray(selectedPart.radius) ? selectedPart.radius : [selectedPart.radius];
            const avgR = radii.reduce((a, b) => a + b) / radii.length;
            const arad = (selectedPart.angle / 2) * Math.PI / 180;
            localCX = Math.sin(arad) * avgR;
            localCY = avgR - Math.cos(arad) * avgR;
        } else {
            localCX = (selectedPart.length || 50) / 2;
            localCY = 0;
        }

        // 中心座標から基準点(x, y)を逆算
        const rad = selectedPart.rotation * Math.PI / 180;
        selectedPart.x = targetCX - (localCX * Math.cos(rad) - localCY * Math.sin(rad));
        selectedPart.y = targetCY - (localCX * Math.sin(rad) + localCY * Math.cos(rad));

        render();
    }
};

canvas.onmouseup = () => {
    if (isDragging && selectedPart) {
        let bestSnap = null;
        let minDist = 25; 
        const myJoints = getJoints(selectedPart);

        for (const target of layers.rail) {
            if (target === selectedPart) continue;
            const targetJoints = getJoints(target);
            for (const mj of myJoints) {
                for (const tj of targetJoints) {
                    const d = Math.hypot(mj.x - tj.x, mj.y - tj.y);
                    if (d < minDist) {
                        minDist = d;
                        bestSnap = { mj, tj };
                    }
                }
            }
        }

        if (bestSnap) {
            const { mj, tj } = bestSnap;
            const targetMJAngle = (tj.angle + 180) % 360;
            let angleDiff = targetMJAngle - mj.angle;
            angleDiff = ((angleDiff + 180) % 360 + 360) % 360 - 180;
            selectedPart.rotation = (selectedPart.rotation + angleDiff + 360) % 360;

            const updatedJoints = getJoints(selectedPart);
            const mjIndex = myJoints.indexOf(mj);
            const updatedMj = updatedJoints[mjIndex];

            selectedPart.x += (tj.x - updatedMj.x);
            selectedPart.y += (tj.y - updatedMj.y);
        }
    }
    // スナップの成否にかかわらずドラッグ状態を終了
    isDragging = false; 
    render();
};

window.onload = () => { initSidebar(); render(); };

// キーボード操作の追加
window.addEventListener('keydown', (e) => {
    // Rキー（小文字・大文字両方）が押され、かつパーツが選択されている場合
    if ((e.key === 'r' || e.key === 'R') && selectedPart) {
        // 現在の角度に 22.5度を加算し、360度でループさせる
        selectedPart.rotation = (selectedPart.rotation + 22.5) % 360;
        render();
    }
    
    // DeleteキーまたはBackspaceキーでパーツ削除（利便性のための追加）
    if ((e.key === 'Delete' || e.key === 'Backspace') && selectedPart) {
        layers.rail = layers.rail.filter(p => p !== selectedPart);
        selectedPart = null;
        render();
    }
});
</script>
</body>
</html>
