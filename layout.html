<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Railroad Models Layout Designer v.0247r2</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #sidebar { width: 250px; background: #2c3e50; color: white; overflow-y: auto; padding: 10px; }
        .rail-item { 
            background: #34495e; margin-bottom: 8px; padding: 10px; border-radius: 4px; 
            cursor: pointer; transition: background 0.2s; font-size: 14px;
        }
        .rail-item:hover { background: #1abc9c; }
        #main { flex: 1; background: #ecf0f1; position: relative; overflow: auto; }
        #canvas { background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: block; margin: 50px; }

        #alert-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        .alert-box {
            background: rgba(255, 0, 0, 0.1);
            color: #ff0000;
            border: 1px solid rgba(255, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            margin-top: 5px;
            pointer-events: none;
            animation: fadeOut 0.5s forwards 4.5s;
        }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

    #zoom-window {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1100;
            user-select: none;
            /* 追加：初期状態を30%の透明度にし、変化を滑らかにする */
            opacity: 0.3;
            transition: opacity 0.2s ease;
        }

        /* ズームパネル */
        #zoom-window:hover {
            opacity: 1.0;
        }

        #zoom-window {
            /* 既存の設定に以下を追加・上書き */
            padding: 5px 10px;        /* 上下の余白を半分に */
            display: flex;
            flex-direction: column;
            justify-content: center;  /* 縦方向に中央寄せ */
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .zoom-slider {
            flex: 1;
            cursor: pointer;
        }
        .zoom-btn {
            background: #1abc9c;
            border: none;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .zoom-quick-btns {
            display: flex;
            justify-content: space-around;
            margin-top: 4px; /* 8pxから4pxに詰め、下の余白を解消 */
        }
        .quick-btn {
            font-size: 11px;
            background: #34495e;
            border: 1px solid #7f8c8d;
            color: #ecf0f1;
            padding: 2px 5px;
            border-radius: 3px;
            cursor: pointer;
        }
        #zoom-display {
            text-align: center;
            font-size: 12px;
            margin-bottom: 2px; /* 5pxから2pxに詰め */
        }

        /* コマンドパネル */
        #extra-panel {
            /* --- 既存の設定を維持 --- */
            position: fixed;
            bottom: 130px; 
            right: 20px;
            background: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1100;
            user-select: none;
            display: flex;
            flex-direction: column;
            overflow: hidden; 

            /* --- マウスオーバーを有効にするための設定 --- */
            opacity: 0.3;
            transition: opacity 0.2s ease;
        }

        /* 追加：マウスがパネルに乗った時に不透明にする */
        #extra-panel:hover {
            opacity: 1.0;
        }

        /* タブコンテナ */
        .panel-tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 5px;
        }

        .panel-tab {
            flex: 1;
            padding: 5px 0;
            font-size: 10px;
            text-align: center;
            background: #2c3e50;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            border-bottom: 2px solid transparent;
        }

        .panel-tab.active {
            background: #34495e;
            border-bottom: 2px solid #1abc9c;
            font-weight: bold;
        }

        /* ボタン群のコンテナ */
        .button-group {
            display: none; /* 基本は非表示 */
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .button-group.active {
            display: flex; /* activeクラスがついた方だけ表示 */
        }

        .dummy-btn {
            width: 100%;
            flex: 1; 
            background: #34495e;
            border: 1px solid #7f8c8d;
            color: #bdc3c7;
            border-radius: 4px;
            cursor: not-allowed;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
    </style>
</head>
<body>
    <div id="sidebar">
        <h3 style="border-bottom: 1px solid #7f8c8d; padding-bottom: 5px;">パーツリスト</h3>
        <div id="rail-list"></div>
    </div>
    <div id="main">
        <canvas id="canvas"></canvas>
    </div>

    <script src="rails.js"></script>

    <script>
// --- 状態管理 ---
const layers = { rail: [] };
const CANVAS_CONFIG = { width: 5000, height: 5000 };
let isDragging = false, draggedPart = null, offsetX = 0, offsetY = 0, isSnapped = false, isCtrlPressed = false;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ウィンドウのサイズ設定（ハードコーディング回避）
const ZOOM_WINDOW_CONFIG = {
    width: 250, height: 70
};
let canvasScale = 1.0; // 100% = 1.0

// 拡張パネルのサイズ設定
const EXTRA_PANEL_CONFIG = {
    width: 150,
    height: 450, // タブ分を考慮して少し高さを確保
    bottom: 130
};
        
/**
 * サイドバーの生成（2階層ツリー表示 / sNameのみ表示）
 */
function initSidebar() {
    const listContainer = document.getElementById('rail-list');
    if (!listContainer) return;
    listContainer.innerHTML = "";

    if (typeof railData === 'undefined') {
        listContainer.innerHTML = "<p style='color:red;'>rails.js not found</p>";
        return;
    }

    // データをツリー構造に整理 [シリーズ][役割]
    const tree = {};
    Object.entries(railData).forEach(([key, rail]) => {
        const series = rail.sSeries || "Unknown";
        const role = rail.sRole || "Other";
        if (!tree[series]) tree[series] = {};
        if (!tree[series][role]) tree[series][role] = [];
        
        // ドラッグ用IDを保持
        const railWithKey = { ...rail, sId: key };
        tree[series][role].push(railWithKey);
    });

    // 第1階層: シリーズ名
    Object.keys(tree).sort().forEach(seriesName => {
        const seriesDetails = document.createElement("details");
        seriesDetails.style.marginBottom = "5px";
        
        const seriesSummary = document.createElement("summary");
        seriesSummary.style.cursor = "pointer";
        seriesSummary.style.fontWeight = "bold";
        seriesSummary.style.padding = "3px";
        seriesSummary.style.background = "#1a252f";
        seriesSummary.textContent = "[+] " + seriesName;
        
        seriesDetails.appendChild(seriesSummary);

        // 第2階層: 役割 (Role)
        Object.keys(tree[seriesName]).sort().forEach(roleName => {
            const roleDetails = document.createElement("details");
            roleDetails.style.marginLeft = "10px";
            roleDetails.style.marginTop = "2px";
            
            const roleSummary = document.createElement("summary");
            roleSummary.style.cursor = "pointer";
            roleSummary.style.fontSize = "13px";
            roleSummary.style.color = "#1abc9c";
            roleSummary.textContent = "> " + roleName;
            
            roleDetails.appendChild(roleSummary);

            // パーツ一覧
            tree[seriesName][roleName].forEach(rail => {
                const div = document.createElement("div");
                div.className = "rail-item";
                div.style.marginLeft = "10px";
                div.style.cursor = "grab";
                div.draggable = true;
                // 表示を sName のみに限定
                div.textContent = rail.sName;
                
                div.ondragstart = (e) => {
                    e.dataTransfer.setData("text/plain", rail.sId);
                    e.dataTransfer.effectAllowed = "copy";
                };
                roleDetails.appendChild(div);
            });
            seriesDetails.appendChild(roleDetails);
        });

        // 開閉時の記号切り替え
        seriesDetails.addEventListener("toggle", () => {
            seriesSummary.textContent = (seriesDetails.open ? "[-] " : "[+] ") + seriesName;
        });

        listContainer.appendChild(seriesDetails);
    });
}
        
/**
 * 汎用座標変換エンジン
 * 中心点(cx, cy)を基準に、オフセット(ox, oy)を角度angle分回転させた座標を返す
 */
function getTransformedPoint(cx, cy, angleDeg, ox, oy) {
    const rad = (angleDeg * Math.PI) / 180;
    const cos = Math.cos(rad);
    const sin = Math.sin(rad);
    return {
        x: cx + ox * cos - oy * sin,
        y: cy + ox * sin + oy * cos,
        ang: (angleDeg + (ox < 0 ? 180 : 0)) % 360 // 接点の向き（外向き）を簡易計算
    };
}

function init() {
    canvas.width = CANVAS_CONFIG.width;
    canvas.height = CANVAS_CONFIG.height;
    initCanvasEvents();
    initSidebar();
    initZoomWindow();
    initExtraPanel();
    render();
}

function initZoomWindow() {
    const container = document.createElement('div');
    container.id = 'zoom-window';
    container.style.width = ZOOM_WINDOW_CONFIG.width + 'px';
    container.style.height = ZOOM_WINDOW_CONFIG.height + 'px';

    container.innerHTML = `
        <div id="zoom-display">ズーム: 100%</div>
        <div class="zoom-controls">
            <button class="zoom-btn" id="zoom-out">－</button>
            <input type="range" class="zoom-slider" id="zoom-range" min="5" max="200" value="100">
            <button class="zoom-btn" id="zoom-plus">＋</button>
        </div>
        <div class="zoom-quick-btns">
            <button class="quick-btn" data-val="50">50%</button>
            <button class="quick-btn" data-val="100">100%</button>
            <button class="quick-btn" data-val="150">150%</button>
        </div>
    `;
    document.body.appendChild(container);

    const range = document.getElementById('zoom-range');
    const display = document.getElementById('zoom-display');

    const updateZoom = (val) => {
        canvasScale = val / 100;
        display.textContent = `ズーム: ${val}%`;
        range.value = val;
        render(); // 再描画時に座標変換を適用
    }; // ← ここが不足、または位置が不正でした

    // transform-origin の初期設定
    canvas.style.transformOrigin = '0 0'; 
    canvas.style.transform = ''; 

    range.oninput = (e) => updateZoom(e.target.value);
    document.getElementById('zoom-out').onclick = () => updateZoom(Math.max(5, parseInt(range.value) - 5));
    document.getElementById('zoom-plus').onclick = () => updateZoom(Math.min(200, parseInt(range.value) + 5));
    
    container.querySelectorAll('.quick-btn').forEach(btn => {
        btn.onclick = () => updateZoom(btn.getAttribute('data-val'));
    });
}
        
function initExtraPanel() {
    const container = document.createElement('div');
    container.id = 'extra-panel';
    container.style.width = EXTRA_PANEL_CONFIG.width + 'px';
    container.style.height = EXTRA_PANEL_CONFIG.height + 'px';
    container.style.bottom = EXTRA_PANEL_CONFIG.bottom + 'px';

    // タブの生成
    const tabContainer = document.createElement('div');
    tabContainer.className = 'panel-tabs';
    tabContainer.innerHTML = `
        <div class="panel-tab active" id="tab-edit">編集</div>
        <div class="panel-tab" id="tab-sys">システム</div>
    `;
    container.appendChild(tabContainer);

    // ボタン群の生成用関数
    const createGroup = (id, prefix, isActive) => {
        const group = document.createElement('div');
        group.id = id;
        group.className = 'button-group' + (isActive ? ' active' : '');
        for (let i = 1; i <= 12; i++) {
            const btn = document.createElement('div');
            btn.className = 'dummy-btn';
            btn.textContent = `${prefix}-${i.toString().padStart(2, '0')}`;
            group.appendChild(btn);
        }
        return group;
    };

    const editGroup = createGroup('group-edit', 'EDIT', true);
    const sysGroup = createGroup('group-sys', 'SYS', false);
    container.appendChild(editGroup);
    container.appendChild(sysGroup);

    document.body.appendChild(container);

    // 切り替えイベント
    const tabs = container.querySelectorAll('.panel-tab');
    tabs.forEach(tab => {
        tab.onclick = () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            const isEdit = tab.id === 'tab-edit';
            editGroup.classList.toggle('active', isEdit);
            sysGroup.classList.toggle('active', !isEdit);
        };
    });
}
        
/**
 * 接点取得の統合
 */
function getConnectorPoints(p) {
    const points = [];
    const commonProps = { parentMaker: p.sMaker, parentGauge: p.nGauge };

    switch (p.sRole) {
        case "straight": {
            const halfLen = p.nLength / 2;
            const offsetsY = p.bIsDouble ? [-(p.nTrackGap / 2), p.nTrackGap / 2] : [0];
            
            offsetsY.forEach(oy => {
                const right = getTransformedPoint(p.x, p.y, p.rotation, halfLen, oy);
                points.push({ ...right, ...commonProps });

                const left = getTransformedPoint(p.x, p.y, p.rotation, -halfLen, oy);
                left.ang = (p.rotation + 180) % 360;
                points.push({ ...left, ...commonProps });
            });
            break;
        }

        case "curve":
        case "approach": {
            // アプローチレールも計算式は曲線と同じため統合
            const halfAngRad = (p.nAngle / 2) * Math.PI / 180;
            const r = p.nRadius;
            const offsetsR = p.bIsDouble ? [-(p.nTrackGap / 2), p.nTrackGap / 2] : [0];

            offsetsR.forEach(or => {
                const currentR = r + or;
                
                // 右端
                const dx1 = Math.sin(halfAngRad) * currentR;
                const dy1 = r - Math.cos(halfAngRad) * currentR;
                const p1 = getTransformedPoint(p.x, p.y, p.rotation, dx1, dy1);
                p1.ang = (p.rotation + (p.nAngle / 2)) % 360;
                points.push({ ...p1, ...commonProps });

                // 左端
                const dx2 = Math.sin(-halfAngRad) * currentR;
                const dy2 = r - Math.cos(-halfAngRad) * currentR;
                const p2 = getTransformedPoint(p.x, p.y, p.rotation, dx2, dy2);
                p2.ang = (p.rotation - (p.nAngle / 2) + 180) % 360;
                points.push({ ...p2, ...commonProps });
            });
            break;
        }
        case "point": {
            const halfLen = p.nLength / 2;
            const r = p.nRadius;
            const angRad = p.nAngle * Math.PI / 180;
            const sDir = p.sDirection;
        
            // 共通：根元（入力側）
            const pRoot = getTransformedPoint(p.x, p.y, p.rotation, -halfLen, 0);
            pRoot.ang = (p.rotation + 180) % 360;
            points.push({ ...pRoot, ...commonProps });
        
            // 直進端（left, right, three の場合）
            if (sDir !== "y") {
                const pStr = getTransformedPoint(p.x, p.y, p.rotation, halfLen, 0);
                pStr.ang = p.rotation % 360;
                points.push({ ...pStr, ...commonProps });
            }
        
            // 左分岐端（left, y, three の場合）
            if (sDir === "left" || sDir === "y" || sDir === "three") {
                const dx = Math.sin(angRad) * r;
                const dy = - (r - Math.cos(angRad) * r);
                const pLeft = getTransformedPoint(p.x, p.y, p.rotation, -halfLen + dx, dy);
                pLeft.ang = (p.rotation - p.nAngle + 360) % 360;
                points.push({ ...pLeft, ...commonProps });
            }
        
            // 右分岐端（right, y, three の場合）
            if (sDir === "right" || sDir === "y" || sDir === "three") {
                const dx = Math.sin(angRad) * r;
                const dy = (r - Math.cos(angRad) * r);
                const pRight = getTransformedPoint(p.x, p.y, p.rotation, -halfLen + dx, dy);
                pRight.ang = (p.rotation + p.nAngle) % 360;
                points.push({ ...pRight, ...commonProps });
            }
            break;
        }
    }
    return points;
}

function render() {
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ズーム基準点の決定（キャンバスの表示領域の中心を基準にするための計算）
    const viewCenterX = window.innerWidth / 2;
    const viewCenterY = window.innerHeight / 2;
    
    let targetX = CANVAS_CONFIG.width / 2;
    let targetY = CANVAS_CONFIG.height / 2;

    if (draggedPart) {
        targetX = draggedPart.x;
        targetY = draggedPart.y;
    }

    // 1. 画面中央に基準点を配置するための平行移動
    ctx.translate(viewCenterX, viewCenterY);
    // 2. ズーム適用
    ctx.scale(canvasScale, canvasScale);
    // 3. 対象パーツ（または中央）が中央に来るように逆移動
    ctx.translate(-targetX, -targetY);

    layers.rail.forEach(part => drawPart(ctx, part));
    ctx.restore();
}

// パーツ描画（ここから描くべきバーツを分岐）
function drawPart(ctx, p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate((p.rotation * Math.PI) / 180);

    switch (p.sRole) {
        case "straight":
            if (p.bIsDouble) {
                drawDoubleStraightPart(ctx, p);
            } else {
                drawSingleStraightPart(ctx, p);
            }
            break;

        case "curve":
            if (p.bIsDouble) {
                drawDoubleCurvePart(ctx, p);
            } else {
                drawSingleCurvePart(ctx, p);
            }
            break;

        case "approach":
            // 選択判定（クリックやドラッグ）を有効にするためにサイズを定義
            // 他の曲線レール(case "curve")と同様のロジックを流用
            if (!p.w || p.w === 0) p.w = p.L || 40; 
            if (!p.h || p.h === 0) p.h = (p.trackPitch || 46);

            if (p.bIsDouble) {
                drawDoubleCurvePart(ctx, p);
            } else {
                drawSingleCurvePart(ctx, p);
            }
            drawApproachIndicator(ctx, p);
            break;
        case "point":
            drawSinglePointPart(ctx, p);
            break;

    }

    if (isCtrlPressed) {
        ctx.beginPath();
        ctx.arc(0, 0, 7.5, 0, Math.PI * 2);
        ctx.fillStyle = (draggedPart === p) ? "#0056b3" : "blue";
        ctx.fill();
        ctx.stroke();
    }
    ctx.restore();
}

// 単線直線描画
function drawSingleStraightPart(ctx, p) {
    const halfLen = p.nLength / 2;
    const halfView = p.nViewWidth / 2;
    const isDragged = (draggedPart === p);
    const mainColor = p.sColor || '#333';

    // 道床と外枠の描画
    drawBallastBed(ctx, p.nLength, p.nViewWidth, isDragged, mainColor);

    // 走行線の描画（オフセットなし）
    drawStraightRail(ctx, p);
}

// 複線直線描画
function drawDoubleStraightPart(ctx, p) {
    const halfLen = p.nLength / 2;
    const halfView = p.nViewWidth / 2;
    const isDragged = (draggedPart === p);
    const mainColor = p.sColor || '#333';
    const gap = p.nTrackGap / 2;

    // 複線用の広い道床を一括で描画
    drawBallastBed(ctx, p.nLength, p.nViewWidth, isDragged, mainColor);

    // 既存の走行線描画を2回呼び出す
    ctx.save();
    ctx.translate(0, -gap);
    drawStraightRail(ctx, p);
    ctx.restore();

    ctx.save();
    ctx.translate(0, gap);
    drawStraightRail(ctx, p);
    ctx.restore();
}

// 複線曲線描画
function drawDoubleCurvePart(ctx, p) {
    const isDragged = (draggedPart === p);
    const mainColor = p.sColor || '#333';
    const r = p.nRadius;
    const gap = p.nTrackGap / 2;

    ctx.save();
    ctx.translate(0, r); // ここで30cmのズレを解消
    drawCurveBallast(ctx, r, p.nAngle, p.nViewWidth, isDragged, mainColor);
    // 2本の走行線を gap 分ずらして配置
    drawCurveRail(ctx, r - gap, p.nAngle, p.nGauge, mainColor);
    drawCurveRail(ctx, r + gap, p.nAngle, p.nGauge, mainColor);
    ctx.restore();
}

// 単線曲線
function drawSingleCurvePart(ctx, p) {
    const isDragged = (draggedPart === p);
    const mainColor = p.sColor || '#333';
    const r = p.nRadius;

    ctx.save();
    ctx.translate(0, r); // ここで30cmのズレを解消
    drawCurveBallast(ctx, r, p.nAngle, p.nViewWidth, isDragged, mainColor);
    drawCurveRail(ctx, r, p.nAngle, p.nGauge, mainColor);
    ctx.restore();
}
            
// 複線曲線
function drawCurveRail(ctx, r, angle, gauge, color) {
    const startRad = ((-angle / 2) - 90) * Math.PI / 180;
    const endRad = ((angle / 2) - 90) * Math.PI / 180;
    const rIn = r - (gauge / 2);
    const rOut = r + (gauge / 2);

    ctx.save();
    ctx.strokeStyle = color || '#333';
    ctx.lineWidth = 1;

    // 内側のレール
    ctx.beginPath();
    ctx.arc(0, 0, rIn, startRad, endRad, false);
    ctx.stroke();

    // 外側のレール
    ctx.beginPath();
    ctx.arc(0, 0, rOut, startRad, endRad, false);
    ctx.stroke();
    ctx.restore();
}

// ポイント描画
function drawSinglePointPart(ctx, p) {
    const halfLen = p.nLength / 2;
    const r = p.nRadius;
    const sDir = p.sDirection;

    // 1. 直線軌道（3方、片開き左/右の場合に描画）
    if (sDir === "left" || sDir === "right" || sDir === "three") {
        drawSingleStraightPart(ctx, p);
    }

    // 2. 曲線軌道（左方向分岐：left, y, three）
    if (sDir === "left" || sDir === "y" || sDir === "three") {
        ctx.save();
        ctx.translate(-halfLen, 0);
        ctx.translate(0, -r);
        ctx.scale(1, -1);
        drawSingleCurvePart(ctx, p);
        ctx.restore();
    }

    // 3. 曲線軌道（右方向分岐：right, y, three）
    if (sDir === "right" || sDir === "y" || sDir === "three") {
        ctx.save();
        ctx.translate(-halfLen, 0);
        ctx.translate(0, r);
        drawSingleCurvePart(ctx, p);
        ctx.restore();
    }
}
        
// 道床（バラスト）とハイライトを描画する共通関数
function drawBallastBed(ctx, len, viewWidth, isDragged, color) {
    const halfL = len / 2;
    const halfV = viewWidth / 2;

    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = color || '#999';
    ctx.beginPath();
    ctx.rect(-halfL, -halfV, len, viewWidth);
    ctx.fill();
    
    ctx.globalAlpha = 1.0;
    ctx.strokeStyle = isDragged ? (isSnapped ? '#007bff' : '#ff4757') : color;
    ctx.lineWidth = isDragged ? 3 : 1;
    ctx.stroke();
    ctx.restore();
}

// 直線走行線（2本の鉄路）のみを描画する最小単位
function drawStraightRail(ctx, p) {
    const halfLen = p.nLength / 2;
    const halfGauge = p.nGauge / 2;
    const mainColor = p.sColor || '#333';

    ctx.beginPath();
    ctx.strokeStyle = mainColor;
    ctx.lineWidth = 1;
    ctx.moveTo(-halfLen, -halfGauge); ctx.lineTo(halfLen, -halfGauge);
    ctx.moveTo(-halfLen,  halfGauge); ctx.lineTo(halfLen,  halfGauge);
    ctx.stroke();
}

// 曲線走行線（2本の鉄路）のみを描画する最小単位
function drawCurveBallast(ctx, r, angle, viewWidth, isDragged, color) {
    const startRad = ((-angle / 2) - 90) * Math.PI / 180;
    const endRad = ((angle / 2) - 90) * Math.PI / 180;
    const innerR = r - (viewWidth / 2);
    const outerR = r + (viewWidth / 2);

    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = color || '#999';
    ctx.beginPath();
    // 外側の弧
    ctx.arc(0, 0, outerR, startRad, endRad, false);
    // 内側の弧（逆回転で閉じる）
    ctx.arc(0, 0, innerR, endRad, startRad, true);
    ctx.closePath();
    ctx.fill();

    // 選択・ドラッグ時のハイライト枠
    ctx.globalAlpha = 1.0;
    ctx.strokeStyle = isDragged ? (isSnapped ? '#007bff' : '#ff4757') : color;
    ctx.lineWidth = isDragged ? 3 : 1;
    ctx.stroke();
    ctx.restore();
}

// アプローチレール用インジケーター
function drawApproachIndicator(ctx, p) {
    const size = 12;
    const offset = 2;

    ctx.save();
    
    ctx.fillStyle = p.sColor || "#7f8c8d";
    ctx.beginPath();

    // 曲線パーツの計算用変数（ソースコード内の定義に準拠）
    const r = p.r || 0;
    const angleRad = (p.angle || 0) * Math.PI / 180;

    if (p.sDirection === 'left') {
        // 左端（始点側）：角度 0 の地点
        // 描画ロジック上のオフセットを考慮し、(r, 0) 付近の端点を指定
        const targetX = r;
        const targetY = 0;
        
        ctx.translate(targetX, targetY);
        ctx.moveTo(-offset, 0);
        ctx.lineTo(-offset + size, -size / 2);
        ctx.lineTo(-offset + size, size / 2);
    } else {
        // 右端（終点側）：角度 angleRad の地点
        // 極座標 (r, theta) をデカルト座標に変換
        const targetX = r * Math.cos(angleRad);
        const targetY = r * Math.sin(angleRad);
        
        ctx.translate(targetX, targetY);
        ctx.rotate(angleRad); // 三角形をレールの端面の角度に合わせる
        ctx.moveTo(offset, 0);
        ctx.lineTo(offset - size, -size / 2);
        ctx.lineTo(offset - size, size / 2);
    }
    
    ctx.closePath();
    ctx.fill();

    // 濃い色にするためのオーバーレイ
    ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
    ctx.fill();
    
    ctx.restore();
}
        
function isPointInPart(mouseX, mouseY, p) {
    // 1. マウス座標をパーツの基準点(p.x, p.y)からの相対座標に変換
    const dx = mouseX - p.x;
    const dy = mouseY - p.y;

    // 2. パーツの回転角(p.rotation)を考慮して座標を逆回転させ、ローカル座標(lx, ly)を得る
    const rad = -(p.rotation * Math.PI / 180);
    const lx = dx * Math.cos(rad) - dy * Math.sin(rad);
    const ly = dx * Math.sin(rad) + dy * Math.cos(rad);

    // --- 直線レールの判定 ---
    if (p.sRole === 'straight') {
        // 幅は nViewWidth、長さは nLength の矩形内か
        return (Math.abs(lx) <= p.nLength / 2 && Math.abs(ly) <= p.nViewWidth / 2);
    }

    // --- 曲線レールの判定 ---
    if (p.sRole === 'curve') {
        const r = p.nRadius;
        const viewWidth = p.nViewWidth;
        const angleLimitRad = (p.nAngle / 2) * Math.PI / 180;

        // 描画時と同様、基準点から半径rだけ「下」にある円の中心点からの距離を計算
        // ローカル座標系では中心点は (0, r) に位置する
        const dist = Math.hypot(lx, ly - r);

        // A. 半径方向の判定：円環の幅（道床の幅）の中にマウスがあるか
        const isInRadius = Math.abs(dist - r) <= viewWidth / 2;
        if (!isInRadius) return false;

        // B. 角度方向の判定：円弧の扇形範囲内にマウスがあるか
        // 中心(0, r)から見たマウス位置の角度を求める
        // 頂点(0, 0)方向が 0 rad になるように調整
        const mouseAngleRad = Math.atan2(lx, r - ly);

        return Math.abs(mouseAngleRad) <= angleLimitRad;
    }

    if (p.sRole === 'point') {
        const sDir = p.sDirection;
        const r = p.nRadius;
        const angLimitRad = p.nAngle * Math.PI / 180;
    
        // 直線判定
        if (sDir !== "y") {
            if (Math.abs(lx) <= p.nLength / 2 && Math.abs(ly) <= p.nViewWidth / 2) return true;
        }
    
        // 曲線判定関数
        const checkCurve = (dir) => {
            const clx = lx + (p.nLength / 2);
            const cly = ly - (r * dir);
            const dist = Math.hypot(clx, cly);
            if (Math.abs(dist - r) <= p.nViewWidth / 2) {
                const mouseAngleRad = Math.atan2(clx, cly * -dir);
                return mouseAngleRad >= 0 && mouseAngleRad <= angLimitRad;
            }
            return false;
        };
        if ((sDir === "left" || sDir === "y" || sDir === "three") && checkCurve(-1)) return true;
        if ((sDir === "right" || sDir === "y" || sDir === "three") && checkCurve(1)) return true;
    }                
    return false;
}

function initCanvasEvents() {
    canvas.ondragover = (e) => e.preventDefault();
    canvas.ondrop = (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const sId = e.dataTransfer.getData("text/plain");
        if (railData[sId]) {
            layers.rail.push({ 
                ...railData[sId], id: Date.now(), 
                x: e.clientX - rect.left, y: e.clientY - rect.top, rotation: 0 
            });
            render();
        }
    };

    function showWarning(message) {
        let container = document.getElementById('alert-container');
        if (!container) {
            container = document.createElement('div');
            container.id = 'alert-container';
            document.body.appendChild(container);
        }
        const alertBox = document.createElement('div');
        alertBox.className = 'alert-box';
        alertBox.textContent = message;
        container.appendChild(alertBox);
        setTimeout(() => alertBox.remove(), 5000);
    }
    
    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        // ズーム倍率を考慮した論理座標への変換
        const mx = (e.clientX - rect.left) / canvasScale;
        const my = (e.clientY - rect.top) / canvasScale;
    
        const target = [...layers.rail].reverse().find(p => isPointInPart(mx, my, p));
    
        if (target) {
            isDragging = true;
            draggedPart = target;
            offsetX = mx - target.x;
            offsetY = my - target.y;
        } else {
            draggedPart = null;
            isDragging = false;
        }
        render();
    };

    canvas.onmousemove = (e) => {
        if (!isDragging || !draggedPart) return;
        const rect = canvas.getBoundingClientRect();
        // ズーム倍率を考慮した論理座標への変換
        const mx = (e.clientX - rect.left) / canvasScale;
        const my = (e.clientY - rect.top) / canvasScale;
    
        const basePosX = mx - offsetX;
        const basePosY = my - offsetY;
    
        // 以降の吸着判定ロジックは変更なし

        draggedPart.x = basePosX;
        draggedPart.y = basePosY;

        let minD = 20, targetP = null, myIdx = -1;
        const myPoints = getConnectorPoints(draggedPart);

        layers.rail.forEach(t => {
            if (t === draggedPart) return;
            const tPoints = getConnectorPoints(t);
            myPoints.forEach((p1, i) => {
                tPoints.forEach(p2 => {
                    const d = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                    if (d < minD) { minD = d; myIdx = i; targetP = p2; }
                });
            });
        });

        if (targetP) {
            const sMaker1 = draggedPart.sMaker;
            const sMaker2 = targetP.parentMaker;
            const nGauge1 = draggedPart.nGauge;
            const nGauge2 = targetP.parentGauge;

            const isMakerMatch = (sMaker1 === sMaker2 || sMaker1 === "universal" || sMaker2 === "universal");
            const isGaugeMatch = (nGauge1 === nGauge2 || nGauge1 === "universal" || nGauge2 === "universal");

            if (!isGaugeMatch) {
                if (!isSnapped) {
                    showWarning(`ゲージが異なるため接続できません (${nGauge1} / ${nGauge2})`);
                    isSnapped = true;
                }
                render();
                return;
            }

            if (!isMakerMatch) {
                if (!isSnapped) {
                    showWarning(`メーカーが異なるため接続できません (${sMaker1} / ${sMaker2})`);
                    isSnapped = true;
                }
                render();
                return;
            }

            const targetAng = (targetP.ang + 180) % 360;

            if (draggedPart.sRole === "curve") {
                const myPointAng = myPoints[myIdx].ang;
                const angleDiff = (myPointAng - draggedPart.rotation + 360) % 360;
                draggedPart.rotation = (targetAng - angleDiff + 360) % 360;
            } else {
                draggedPart.rotation = (targetAng - (myIdx % 2 === 0 ? 0 : 180) + 360) % 360;
            }

            const currentPoints = getConnectorPoints(draggedPart);
            draggedPart.x += (targetP.x - currentPoints[myIdx].x);
            draggedPart.y += (targetP.y - currentPoints[myIdx].y);

            if (!isSnapped) {
                offsetX = mx - draggedPart.x;
                offsetY = my - draggedPart.y;
                isSnapped = true; 
            }
        } else {
            isSnapped = false;
        }
        render();
    };

    window.onmouseup = () => { 
        isDragging = false; 
        render(); 
    };
}

window.onkeydown = (e) => {
    switch (e.key) {
        case 'r':
        case 'R':
            const t = draggedPart || layers.rail[layers.rail.length - 1];
            if (t) {
                t.rotation = (t.rotation + 22.5) % 360;
                render();
            }
            break;

        case 'Control':
            isCtrlPressed = true;
            render();
            break;

        case 'Delete':
        case 'Backspace':
            if (draggedPart) {
                layers.rail = layers.rail.filter(p => p !== draggedPart);
                draggedPart = null;
                render();
            }
            break;
    }
};
window.onkeyup = (e) => {
    if (e.key === 'Control') { 
        isCtrlPressed = false;
        render();
    } 
};

init();
    </script>
