<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Railroad Models Layout Designer v.0120r</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; }
        /* サイドバー */
        #sidebar { width: 250px; background: #2c3e50; color: white; overflow-y: auto; padding: 10px; }
        .rail-item { 
            background: #34495e; margin-bottom: 8px; padding: 10px; border-radius: 4px; 
            cursor: pointer; transition: background 0.2s; font-size: 14px;
        }
        .rail-item:hover { background: #1abc9c; }
        .rail-item-sub { font-size: 11px; color: #bdc3c7; display: block; margin-top: 4px; }
        
        /* メインエリア */
        /* メインエリアをスクロール可能にし、キャンバスを中央配置するための設定 */
        #main { 
            flex: 1; 
            background: #ecf0f1; 
            position: relative; 
            overflow: auto; /* 上下左右スクロールバーを表示 */
        }
        
        #canvas { 
            background: white; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
            display: block; 
            margin: 50px; /* キャンバス端の操作性を高めるための余白 */
        }
    </style>
</head>
    <body>
    
        <div id="sidebar">
            <h3 style="border-bottom: 1px solid #7f8c8d; padding-bottom: 5px;">パーツリスト</h3>
            <div id="rail-list"></div>
        </div>
    
        <div id="main">
            <canvas id="canvas"></canvas>
        </div>
    
        <script src="rails.js"></script>
    
        <script>
// --- 状態管理 ---
const layers = {
    rail: [] // キャンバス上のレール
};

const CANVAS_CONFIG = {
    width: 5000,
    height: 5000
};

// --- マウス操作ステート ---
let isDragging = false;
let draggedPart = null; 
let offsetX = 0;
let offsetY = 0;
let isSnapped = false;
let isCtrlPressed = false;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

/**
 * 初期化
 */
function init() {
    canvas.width = CANVAS_CONFIG.width;
    canvas.height = CANVAS_CONFIG.height;
    initCanvasEvents();
    initSidebar(); // サイドバーの生成を実行
    render();
}

/**
 * サイドバーの生成（2階層ツリー表示 / sNameのみ表示）
 */
function initSidebar() {
    const listContainer = document.getElementById('rail-list');
    if (!listContainer) return;
    listContainer.innerHTML = "";

    if (typeof railData === 'undefined') {
        listContainer.innerHTML = "<p style='color:red;'>rails.js not found</p>";
        return;
    }

    // データをツリー構造に整理 [シリーズ][役割]
    const tree = {};
    Object.entries(railData).forEach(([key, rail]) => {
        const series = rail.sSeries || "Unknown";
        const role = rail.sRole || "Other";
        if (!tree[series]) tree[series] = {};
        if (!tree[series][role]) tree[series][role] = [];
        
        // ドラッグ用IDを保持
        const railWithKey = { ...rail, sId: key };
        tree[series][role].push(railWithKey);
    });

    // 第1階層: シリーズ名
    Object.keys(tree).sort().forEach(seriesName => {
        const seriesDetails = document.createElement("details");
        seriesDetails.style.marginBottom = "5px";
        
        const seriesSummary = document.createElement("summary");
        seriesSummary.style.cursor = "pointer";
        seriesSummary.style.fontWeight = "bold";
        seriesSummary.style.padding = "3px";
        seriesSummary.style.background = "#1a252f";
        seriesSummary.textContent = "[+] " + seriesName;
        
        seriesDetails.appendChild(seriesSummary);

        // 第2階層: 役割 (Role)
        Object.keys(tree[seriesName]).sort().forEach(roleName => {
            const roleDetails = document.createElement("details");
            roleDetails.style.marginLeft = "10px";
            roleDetails.style.marginTop = "2px";
            
            const roleSummary = document.createElement("summary");
            roleSummary.style.cursor = "pointer";
            roleSummary.style.fontSize = "13px";
            roleSummary.style.color = "#1abc9c";
            roleSummary.textContent = "> " + roleName;
            
            roleDetails.appendChild(roleSummary);

            // パーツ一覧
            tree[seriesName][roleName].forEach(rail => {
                const div = document.createElement("div");
                div.className = "rail-item";
                div.style.marginLeft = "10px";
                div.style.cursor = "grab";
                div.draggable = true;
                // 表示を sName のみに限定
                div.textContent = rail.sName;
                
                div.ondragstart = (e) => {
                    e.dataTransfer.setData("text/plain", rail.sId);
                    e.dataTransfer.effectAllowed = "copy";
                };
                roleDetails.appendChild(div);
            });
            seriesDetails.appendChild(roleDetails);
        });

        // 開閉時の記号切り替え
        seriesDetails.addEventListener("toggle", () => {
            seriesSummary.textContent = (seriesDetails.open ? "[-] " : "[+] ") + seriesName;
        });

        listContainer.appendChild(seriesDetails);
    });
}
            
/**
 * 接点計算ロジック (中央基準・単線直線対応版 + 複線曲線対応)
 */
function getConnectorPoints(p, x, y, rotation) {
    const points = [];
    const rad = (rotation * Math.PI) / 180;

    // ローカル座標(中央基準)をグローバル座標に変換する関数
    const transform = (rx, ry) => {
        const tx = rx * Math.cos(rad) - ry * Math.sin(rad);
        const ty = rx * Math.sin(rad) + ry * Math.cos(rad);
        return { x: x + tx, y: y + ty };
    };

    const jCount = p.junctionCount || 2;
    const halfLen = (p.nLength || 0) / 2;

    if (p.sRole === "straight") {
        if (!p.bIsDouble) {
            // --- 単線直線 ---
            points.push(transform(-halfLen, 0)); 
            points.push(transform(halfLen, 0));  
        } else {
            // --- 複線直線 ---
            const halfGap = (p.nTrackGap || 33) / 2;
            points.push(transform(-halfLen, -halfGap)); 
            points.push(transform(-halfLen, halfGap));  
            points.push(transform(halfLen, -halfGap));  
            points.push(transform(halfLen, halfGap));   
        }
    } else if (p.sRole === "curve") {
        const halfAngle = (p.nAngle * Math.PI) / 360; 
        
        if (!p.bIsDouble) {
            // --- 単線曲線 ---
            const R = p.nRadius;
            const jY = R * Math.sin(halfAngle);
            points.push(transform(0, -jY));
            points.push(transform(0, jY));
        } else {
            // --- 複線曲線 ---
            const rOuter = p.nRadius;
            const rInner = p.nRadius - (p.nTrackGap || 33);
            
            // 外側レールの接点（x=0）
            const jYOuter = rOuter * Math.sin(halfAngle);
            
            // 【修正】内側レールの接点X座標
            // 中心点 centerX = -rOuter * cos(halfAngle) から、
            // 半径 rInner で角度 halfAngle の位置にある点の相対座標を算出
            // const jXInner = (rOuter - rInner) * Math.cos(halfAngle);
            const jXInner = (rInner - rOuter) * Math.cos(halfAngle);
            const jYInner = rInner * Math.sin(halfAngle);

            // [外上, 外下, 内上, 内下] の順で追加
            points.push(transform(0, -jYOuter));         // 外側・上
            points.push(transform(0, jYOuter));          // 外側・下
            points.push(transform(jXInner, -jYInner));   // 内側・上
            points.push(transform(jXInner, jYInner));    // 内側・下
        }
    }

    // 指示通りの junctionCount 数だけ返す
    return points.slice(0, jCount);
}

/**
 * 描画処理
 */
function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    layers.rail.forEach(part => drawPart(ctx, part));
}
            
/**
 * レール描画のエントリーポイント
 */
function drawPart(ctx, p) {
    ctx.save();
    
    // 基準点(中央)への座標変換
    ctx.translate(p.x, p.y);
    ctx.rotate((p.rotation * Math.PI) / 180);

    if (p.sRole === "straight") {
        drawStraightRail(ctx, p);
    } else if (p.sRole === "curve") {
        if (p.bIsDouble) {
            drawDoubleCurveRail(ctx, p);
        } else {
            drawCurveRail(ctx, p);
        }
    }

    // 基準点マーカーの描画制御
    if (p.sRole === "straight" || p.sRole === "curve") {
        if (isCtrlPressed) {
            const isDragged = (typeof draggedPart !== 'undefined' && p === draggedPart);
            
            ctx.beginPath();
            // 複線曲線かつ統合マーカー座標がある場合はその位置、そうでなければ(0,0)
            const markerX = (p.bIsDouble && p.combinedCenter) ? p.combinedCenter.x : 0;
            const markerY = (p.bIsDouble && p.combinedCenter) ? p.combinedCenter.y : 0;
            
            ctx.arc(markerX, markerY, 7.5, 0, Math.PI * 2); 
            
            ctx.fillStyle = isDragged ? "rgba(0, 86, 179, 1.0)" : "blue";
            ctx.fill();
            ctx.strokeStyle = isDragged ? "#003d80" : "#333";
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    }

    ctx.restore();
}

/**
 * 直線レール（単線・複線）の計算および描画
 */
function drawStraightRail(ctx, p) {
    const halfLen = p.nLength / 2;
    const halfView = p.nViewWidth / 2;
    const halfGauge = p.nGauge / 2;
    const isDouble = p.bIsDouble;
    const gap = p.nTrackGap || 33;
    const halfGap = gap / 2;

    const isDragged = (typeof draggedPart !== 'undefined' && p === draggedPart);
    const mainColor = p.sColor || '#333';

    // 1. 道床（バラスト）の描画
    const originalAlpha = ctx.globalAlpha; // 現在の透明度を保存
    ctx.globalAlpha = 0.3;                 // 半透明に設定（0.3 = 30%）
    ctx.fillStyle = p.sColor || '#999';    // 色名(Green等)をそのまま代入
    
    ctx.strokeStyle = isDragged ? (typeof isSnapped !== 'undefined' && isSnapped ? '#007bff' : '#ff4757') : mainColor;
    ctx.lineWidth = isDragged ? 3 : 1;

    ctx.beginPath();
    ctx.rect(-halfLen, -halfView, p.nLength, p.nViewWidth);
    ctx.fill();
    
    ctx.globalAlpha = originalAlpha;       // 透明度を元に戻す（枠線とレール描画のため）
    ctx.stroke();

    // 2. レールの描画
    ctx.beginPath();
    ctx.strokeStyle = mainColor;
    ctx.lineWidth = 1;

    // 軌道のオフセット位置を決定
    const trackOffsets = isDouble ? [-halfGap, halfGap] : [0];

    trackOffsets.forEach(offsetY => {
        // 各軌道の上側レール
        ctx.moveTo(-halfLen, offsetY - halfGauge);
        ctx.lineTo(halfLen, offsetY - halfGauge);
        // 各軌道の下側レール
        ctx.moveTo(-halfLen, offsetY + halfGauge);
        ctx.lineTo(halfLen, offsetY + halfGauge);
    });
    ctx.stroke();

    // 3. 吸着点（Junction）の座標更新（相対座標）
    // junctionCountに基づいて配列を再生成
    if (p.junctionCount) {
        p.junctions = [];
        trackOffsets.forEach(offsetY => {
            p.junctions.push({ x: -halfLen, y: offsetY }); // 始点側
            p.junctions.push({ x: halfLen, y: offsetY });  // 終点側
        });
        // 指定された数(junctionCount)に制限
        p.junctions = p.junctions.slice(0, p.junctionCount);
    }
}

/**
 * 曲線レールの計算および描画（単線専用）
 */
function drawCurveRail(ctx, p) {
    const R = p.nRadius;
    const angleDeg = p.nAngle;
    const angleRad = (angleDeg * Math.PI) / 180;
    const halfAngle = angleRad / 2;
    const halfGauge = p.nGauge / 2;
    const halfView = p.nViewWidth / 2;

    const centerX = -R * Math.cos(halfAngle);
    const centerY = 0; 

    const startAngle = -halfAngle;
    const endAngle = halfAngle;

    const mainColor = p.sColor || '#333';
    // ドラッグ状態のスタイル判定（親関数 drawPart の変数を参照していると想定）
    const isDragged = (typeof draggedPart !== 'undefined' && p === draggedPart);

    // 1. 道床（バラスト）の塗りつぶしと縁取り
    ctx.beginPath();
    // 外側の弧（時計回り）
    ctx.arc(centerX, centerY, R + halfView, startAngle, endAngle);
    // 内側の弧（反時計回りで戻ることでパスを閉じる）
    ctx.arc(centerX, centerY, R - halfView, endAngle, startAngle, true);
    ctx.closePath();

    // 塗りつぶし（透過）
    const prevAlpha = ctx.globalAlpha; 

    // 塗りつぶし実行（色名が Green 等でも globalAlpha を使えば確実に半透明になります）
    ctx.globalAlpha = 0.3;              // 透明度を指定（0.0〜1.0）
    ctx.fillStyle = p.sColor || '#999'; // 文字列結合 "+ 33" を削除
    ctx.fill();

    // 縁取りの前に透明度を戻す（枠線をくっきりさせるため）
    ctx.globalAlpha = prevAlpha; 

    // 縁取り（輪郭線）
    ctx.strokeStyle = isDragged ? (typeof isSnapped !== 'undefined' && isSnapped ? '#007bff' : '#ff4757') : mainColor;
    ctx.lineWidth = isDragged ? 3 : 1;
    ctx.stroke();

    // 縁取り（輪郭線）
    ctx.strokeStyle = isDragged ? (typeof isSnapped !== 'undefined' && isSnapped ? '#007bff' : '#ff4757') : mainColor;
    ctx.lineWidth = isDragged ? 3 : 1;
    ctx.stroke();

    // 2. レール（2本の円弧）の描画
    ctx.lineWidth = 1;
    ctx.strokeStyle = mainColor;

    // 外側レール
    ctx.beginPath();
    ctx.arc(centerX, centerY, R + halfGauge, startAngle, endAngle);
    ctx.stroke();

    // 内側レール
    ctx.beginPath();
    ctx.arc(centerX, centerY, R - halfGauge, startAngle, endAngle);
    ctx.stroke();

    // 3. 吸着点（Junction）の座標更新
    if (p.junctionCount) {
        const jX = 0; 
        const jY = R * Math.sin(halfAngle);
        
        p.junctions = [
            { x: jX, y: -jY }, // 始点側
            { x: jX, y: jY }   // 終点側
        ];
        p.junctions = p.junctions.slice(0, p.junctionCount);
    }
}

/**
 * 複線曲線レールの描画（ループ不使用・一括描画版）
 */
function drawDoubleCurveRail(ctx, p) {
    const rOuter = p.nRadius;
    const rInner = p.nRadius - (p.nTrackGap || 33);
    const angleDeg = p.nAngle;
    const angleRad = (angleDeg * Math.PI) / 180;
    const halfAngle = angleRad / 2;
    const halfGauge = (p.nGauge || 9) / 2;
    const halfView = (p.nViewWidth || 25) / 2;

    const mainColor = p.sColor || '#333';
    const isDragged = (typeof draggedPart !== 'undefined' && p === draggedPart);
    
    // 中心点は外側レールの頂点(0,0)を基準に算出
    const centerX = -rOuter * Math.cos(halfAngle);
    const centerY = 0;
    const startAngle = -halfAngle;
    const endAngle = halfAngle;

    // 1. 道床（バラスト）の一括描画
    ctx.beginPath();
    ctx.arc(centerX, centerY, rOuter + halfView, startAngle, endAngle);
    ctx.arc(centerX, centerY, rInner - halfView, endAngle, startAngle, true);
    ctx.closePath();
    const originalAlpha = ctx.globalAlpha; // 現在の透明度を保存
    ctx.globalAlpha = 0.3;                 // 半透明に設定
    ctx.fillStyle = p.sColor || '#999';    // 色名(Green等)を適用
    ctx.fill();                            // 塗りつぶし実行

    ctx.globalAlpha = originalAlpha;       // 透明度を元に戻す
    
    // 縁取り（輪郭線）
    ctx.strokeStyle = isDragged ? (typeof isSnapped !== 'undefined' && isSnapped ? '#007bff' : '#ff4757') : mainColor;
    ctx.lineWidth = isDragged ? 3 : 1;
    ctx.stroke();

    // 2. レールの描画（ループを使わず4本個別に記述）
    ctx.lineWidth = 1;
    ctx.strokeStyle = mainColor;

    // 外側線・外レール
    ctx.beginPath();
    ctx.arc(centerX, centerY, rOuter + halfGauge, startAngle, endAngle);
    ctx.stroke();
    // 外側線・内レール
    ctx.beginPath();
    ctx.arc(centerX, centerY, rOuter - halfGauge, startAngle, endAngle);
    ctx.stroke();
    // 内側線・外レール
    ctx.beginPath();
    ctx.arc(centerX, centerY, rInner + halfGauge, startAngle, endAngle);
    ctx.stroke();
    // 内側線・内レール
    ctx.beginPath();
    ctx.arc(centerX, centerY, rInner - halfGauge, startAngle, endAngle);
    ctx.stroke();

    // 3. 接続点および内側基準点の更新
    if (p.junctionCount) {
        const jYOuter = rOuter * Math.sin(halfAngle);
        const jYInner = rInner * Math.sin(halfAngle);
        // 内側端点のX座標（外側頂点からの相対距離）
        const jXInner = (rOuter - rInner) * Math.cos(halfAngle);

        p.junctions = [
            { x: 0, y: -jYOuter },
            { x: 0, y: jYOuter },
            { x: jXInner, y: -jYInner },
            { x: jXInner, y: jYInner }
        ];
        p.junctions = p.junctions.slice(0, p.junctionCount);

        // 【修正】内側レールの基準点。
        // 外側頂点(0,0)から、中心(centerX)との差分だけ右（プラス方向）に配置
        p.innerCenter = { x: rOuter - rInner, y: 0 };
    }
}
            
/**
 * パーツの選択判定（回転・複線対応版）
 */
function isPointInPart(mouseX, mouseY, p) {
    const ctx = canvas.getContext('2d');
    ctx.save();

    // 1. マウス座標をパーツのローカル座標系に変換する（逆変換）
    // これにより、パーツが何分回転していても、計算上は「回転していない状態」として判定できます
    ctx.translate(p.x, p.y);
    ctx.rotate((p.nRotation || 0) * Math.PI / 180);

    // Canvas上の絶対座標(mouseX, mouseY)を、現在の行列の「逆」を使って変換
    // これでどんな回転角度でも、常にパーツの見た目通りの位置を判定可能になります
    const transform = ctx.getTransform();
    const invMat = transform.inverse();
    const localP = new DOMPoint(mouseX, mouseY).matrixTransform(invMat);

    ctx.beginPath();
    
    // --- 直線判定（sRole === 'straight'） ---
    if (p.sRole === 'straight') {
        const halfLen = p.nLength / 2;
        const halfView = p.nViewWidth / 2;
        // 面判定に拡張：中心から20pxではなく、道床の幅（halfView）全体で判定
        ctx.rect(-halfLen, -halfView, p.nLength, p.nViewWidth);
    } 
    // --- 曲線・複線判定 ---
    else if (p.nRadius !== undefined) {
        const R = p.nRadius;
        const angleRad = (p.nAngle * Math.PI) / 180;
        const halfAngle = angleRad / 2;
        const halfView = p.nViewWidth / 2;
        const centerX = -R * Math.cos(halfAngle);
        const startAngle = -halfAngle;
        const endAngle = halfAngle;

        if (p.sRole !== 'double-curve') {
            // 単線曲線：外側と内側の弧を正確に結ぶ
            ctx.arc(centerX, 0, R + halfView, startAngle, endAngle);
            ctx.arc(centerX, 0, R - halfView, endAngle, startAngle, true);
        } else {
            // 複線曲線：外側レールの端から、内側レールの端までを一つの「面」として定義
            const gap = p.nTrackGap || 33;
            const rInner = R - gap;
            ctx.arc(centerX, 0, R + halfView, startAngle, endAngle);
            ctx.arc(centerX, 0, rInner - halfView, endAngle, startAngle, true);
        }
    } 
    // --- その他（ポイント等） ---
    else {
        // デフォルトの矩形/円形判定
        ctx.arc(0, 0, 20, 0, Math.PI * 2);
    }

    ctx.closePath();

    // ローカル座標(localP)が、作成したパス内にあるか判定
    const isHit = ctx.isPointInPath(localP.x, localP.y);

    ctx.restore();
    return isHit;
}
            
/**
 * イベント処理
 */
function initCanvasEvents() {
    // キャンバスへのドロップでパーツ追加
    canvas.ondragover = (e) => e.preventDefault();
    canvas.ondrop = (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const sId = e.dataTransfer.getData("text/plain");
        if (railData[sId]) {
            const newPart = { 
                ...railData[sId], 
                id: Date.now(), 
                x: e.clientX - rect.left, 
                y: e.clientY - rect.top, 
                rotation: 0 
            };
            layers.rail.push(newPart);
            render();
        }
    };

// キャンバス上のドラッグ操作（mousedown内）
canvas.onmousedown = function(e) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    for (let i = layers.rail.length - 1; i >= 0; i--) {
        const p = layers.rail[i];
        // isPointInPart の戻り値が正しければ、既存のドラッグ処理をそのまま実行
        if (isPointInPart(mouseX, mouseY, p)) {
            draggedPart = p;
            isDragging = true;
            
            offsetX = mouseX - p.x;
            offsetY = mouseY - p.y;
            
            // 機能を削らず、既存の重なり順変更を維持
            layers.rail.splice(i, 1);
            layers.rail.push(draggedPart);
            
            render(); 
            break;
        }
    }
};

    canvas.onmousemove = function(e) {
        if (!isDragging || !draggedPart) return;
        const rect = canvas.getBoundingClientRect();
        draggedPart.x = (e.clientX - rect.left) - offsetX;
        draggedPart.y = (e.clientY - rect.top) - offsetY;

        let minDistance = 20;
        let targetCoords = null;
        let myPointIdx = -1;

        const myPoints = getConnectorPoints(draggedPart, draggedPart.x, draggedPart.y, draggedPart.rotation);

        layers.rail.forEach(t => {
            if (t === draggedPart) return;
            const tPoints = getConnectorPoints(t, t.x, t.y, t.rotation);
            myPoints.forEach((p1, i) => {
                tPoints.forEach(p2 => {
                    const d = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                    if (d < minDistance) { minDistance = d; myPointIdx = i; targetCoords = p2; }
                });
            });
        });

        if (targetCoords) {
            const relPoints = getConnectorPoints(draggedPart, 0, 0, draggedPart.rotation);
            draggedPart.x = targetCoords.x - relPoints[myPointIdx].x;
            draggedPart.y = targetCoords.y - relPoints[myPointIdx].y;
            isSnapped = true;
        } else { isSnapped = false; }
        render();
    };

    window.onmouseup = () => { isDragging = false; draggedPart = null; render(); };
}

// Rキー回転
window.onkeydown = (e) => {
    if (e.key.toLowerCase() === 'r') {
        const t = draggedPart || layers.rail[layers.rail.length-1];
        if (t) { t.rotation = (t.rotation + 22.5) % 360; render(); e.preventDefault(); }
    }
};

window.addEventListener('keydown', (e) => {
    if (e.key === 'Control') {
        isCtrlPressed = true;
        console.log("Ctrl Pressed: ", isCtrlPressed);
        render();
    }
});

window.addEventListener('keyup', (e) => {
    if (e.key === 'Control') {
        isCtrlPressed = false;
        render();
    }
});
            
// 起動
init();
       
        </script>
    </body>
</html>
