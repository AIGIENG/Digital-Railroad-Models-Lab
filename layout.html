<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Railroad Models Layout Designer v.0029/title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; }
        /* サイドバー */
        #sidebar { width: 250px; background: #2c3e50; color: white; overflow-y: auto; padding: 10px; }
        .rail-item { 
            background: #34495e; margin-bottom: 8px; padding: 10px; border-radius: 4px; 
            cursor: pointer; transition: background 0.2s; font-size: 14px;
        }
        .rail-item:hover { background: #1abc9c; }
        .rail-item-sub { font-size: 11px; color: #bdc3c7; display: block; margin-top: 4px; }
        
        /* メインエリア */
        /* メインエリアをスクロール可能にし、キャンバスを中央配置するための設定 */
        #main { 
            flex: 1; 
            background: #ecf0f1; 
            position: relative; 
            overflow: auto; /* 上下左右スクロールバーを表示 */
        }
        
        #canvas { 
            background: white; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
            display: block; 
            margin: 50px; /* キャンバス端の操作性を高めるための余白 */
        }
    </style>
</head>
    <body>
    
        <div id="sidebar">
            <h3 style="border-bottom: 1px solid #7f8c8d; padding-bottom: 5px;">パーツリスト</h3>
            <div id="rail-list"></div>
        </div>
    
        <div id="main">
            <canvas id="canvas"></canvas>
        </div>
    
        <script src="rails.js"></script>
    
        <script>
            // --- 状態管理 ---
            const layers = {
                rail: [] // キャンバス上に配置されたレールの配列
            };
        
            // --- キャンバス設定 ---
            const CANVAS_CONFIG = {
                width: 5000,
                height: 5000
            };
        
            // --- マウス操作用ステート ---
            let isDragging = false;
            let draggedPart = null;
            let dragOffset = { x: 0, y: 0 };
        
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
        
            /**
             * 初期化処理
             */
            function init() {
                initCanvas();
                initSidebar();
                render();
            }
        
            /**
             * キャンバスの初期化
             */
            function initCanvas() {
                canvas.width = CANVAS_CONFIG.width;
                canvas.height = CANVAS_CONFIG.height;
            }
        
            /**
             * サイドバーの生成（ドラッグ専用版）
             * クリック配置を廃止し、ドラッグ＆ドロップのみを有効にします。
             */
            function initSidebar() {
                const listContainer = document.getElementById('rail-list');
                listContainer.innerHTML = "";
            
                if (typeof railData === 'undefined') {
                    listContainer.innerHTML = "<p style='color:red;'>rails.js not found</p>";
                    return;
                }
            
                const tree = {};
                Object.entries(railData).forEach(([key, rail]) => {
                    rail.sId = key;
                    const series = rail.sSeries || "Unknown Series";
                    const role = rail.sRole || "Other";
                    if (!tree[series]) tree[series] = {};
                    if (!tree[series][role]) tree[series][role] = [];
                    tree[series][role].push(rail);
                });
            
                Object.keys(tree).sort().forEach(seriesName => {
                    const seriesDetails = document.createElement("details");
                    seriesDetails.style.marginBottom = "10px";
                    const seriesSummary = document.createElement("summary");
                    seriesSummary.style.cursor = "pointer";
                    seriesSummary.style.fontWeight = "bold";
                    seriesSummary.style.padding = "5px";
                    seriesSummary.style.background = "#1a252f";
                    seriesSummary.textContent = "[+] " + seriesName;
                    seriesDetails.appendChild(seriesSummary);
            
                    Object.keys(tree[seriesName]).sort().forEach(roleName => {
                        const roleDetails = document.createElement("details");
                        roleDetails.style.marginLeft = "15px";
                        roleDetails.style.marginTop = "5px";
                        const roleSummary = document.createElement("summary");
                        roleSummary.style.cursor = "pointer";
                        roleSummary.style.fontSize = "13px";
                        roleSummary.style.color = "#1abc9c";
                        roleSummary.textContent = "> " + roleName;
                        roleDetails.appendChild(roleSummary);
            
                        tree[seriesName][roleName].forEach(rail => {
                            const div = document.createElement("div");
                            div.className = "rail-item";
                            div.style.marginLeft = "10px";
                            div.style.cursor = "grab"; // ドラッグ可能であることを示すカーソル
                            div.draggable = true;      // HTML5ドラッグを有効化
                            div.innerHTML = `${rail.sName}<span class="rail-item-sub">${rail.sProductCode}</span>`;
                            
                            // 【クリック配置廃止】div.onclick は設定しません
            
                            // ドラッグ開始時に ID を格納
                            div.ondragstart = (e) => {
                                e.dataTransfer.setData("text/plain", rail.sId);
                                e.dataTransfer.effectAllowed = "copy";
                            };
            
                            roleDetails.appendChild(div);
                        });
                        seriesDetails.appendChild(roleDetails);
                    });
            
                    seriesDetails.addEventListener("toggle", () => {
                        seriesSummary.textContent = (seriesDetails.open ? "[-] " : "[+] ") + seriesName;
                    });
                    listContainer.appendChild(seriesDetails);
                });
            }
        
            /**
             * パーツをキャンバスに追加
             */
            function addPartToCanvas(sourceData) {
                // スクロール位置を考慮して、現在の表示エリアの中央付近に配置
                const mainArea = document.getElementById('main');
                const scrollX = mainArea.scrollLeft;
                const scrollY = mainArea.scrollTop;
        
                const newPart = {
                    ...sourceData,
                    id: Date.now(),
                    x: scrollX + 200,
                    y: scrollY + 200,
                    rotation: 0
                };
                layers.rail.push(newPart);
                render();
            }
        
            /**
             * マウス座標取得（キャンバス相対）
             */
            function getMousePos(canvas, evt) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: evt.clientX - rect.left,
                    y: evt.clientY - rect.top
                };
            }

            /**
             * 描画処理
             */
            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                layers.rail.forEach(part => drawPart(ctx, part));
            }

            function drawPart(ctx, p) {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate((p.rotation * Math.PI) / 180);
            
                const halfView = p.nViewWidth / 2;
                const halfGauge = (p.nGauge && p.nGauge > 0) ? p.nGauge / 2 : 0;
                const centerOffset = p.bIsDouble ? (p.nTrackGap / 2) : 0;
            
                // --- 1. 外形描画 (既存維持) ---
                ctx.strokeStyle = p.sColor;
                ctx.lineWidth = 1;
                ctx.fillStyle = p.sColor + "33"; 
                ctx.beginPath();
                if (p.sRole === "straight" || p.sRole === "structure" || p.sRole === "furniture") {
                    const yStart = centerOffset - halfView;
                    ctx.fillRect(0, yStart, p.nLength, p.nViewWidth);
                    ctx.strokeRect(0, yStart, p.nLength, p.nViewWidth);
                } else if (p.sRole === "curve" || p.sRole === "approach") {
                    const centerR = p.nRadius - centerOffset;
                    const outerEdgeR = centerR + halfView;
                    const innerEdgeR = centerR - halfView;
                    ctx.arc(0, p.nRadius, outerEdgeR, -Math.PI / 2, (-90 + p.nAngle) * Math.PI / 180);
                    ctx.arc(0, p.nRadius, innerEdgeR, (-90 + p.nAngle) * Math.PI / 180, -Math.PI / 2, true);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
            
                // --- 2. レール描画 (既存維持) ---
                if (halfGauge > 0) {
                    ctx.strokeStyle = "#555555";
                    ctx.lineWidth = 1;
                    drawRailLines(ctx, p, 0, halfGauge);
                    if (p.bIsDouble && p.nTrackGap > 0) {
                        drawRailLines(ctx, p, p.nTrackGap, halfGauge);
                    }
                }
            
                // --- 3. 選択・移動中の中心印（〇） ---
                // isDragging が true かつ、現在ドラッグ中のIDと一致する場合のみ表示
                if (isDragging === true && draggedPart && draggedPart.id === p.id) {
                    let cX, cY;
                    if (p.sRole === "straight" || p.sRole === "structure" || p.sRole === "furniture") {
                        cX = p.nLength / 2;
                        cY = centerOffset;
                    } else if (p.sRole === "curve" || p.sRole === "approach") {
                        const midAngle = ((-90 + (p.nAngle / 2)) * Math.PI / 180);
                        const midR = p.nRadius - centerOffset;
                        cX = midR * Math.cos(midAngle);
                        cY = p.nRadius + midR * Math.sin(midAngle);
                    }
            
                    ctx.beginPath();
                    ctx.strokeStyle = "#ff0000";
                    ctx.lineWidth = 2;
                    ctx.arc(cX, cY, 8, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = "#ff0000";
                    ctx.beginPath();
                    ctx.arc(cX, cY, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            
                ctx.restore();
            }
            
            /**
             * レール線路描画の共通処理（既存維持）
             */
            function drawRailLines(ctx, p, offset, hg) {
                if (p.sRole === "straight") {
                    ctx.beginPath();
                    ctx.moveTo(0, offset - hg); ctx.lineTo(p.nLength, offset - hg);
                    ctx.moveTo(0, offset + hg); ctx.lineTo(p.nLength, offset + hg);
                    ctx.stroke();
                } else if (p.sRole === "curve" || p.sRole === "approach") {
                    const r = p.nRadius - offset;
                    ctx.beginPath();
                    ctx.arc(0, p.nRadius, r - hg, -Math.PI / 2, (-90 + p.nAngle) * Math.PI / 180);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(0, p.nRadius, r + hg, -Math.PI / 2, (-90 + p.nAngle) * Math.PI / 180);
                    ctx.stroke();
                }
            }
                        
            /**
             * キャンバスのイベント初期化（ドロップ対応）
             */
            function initCanvasEvents() {
                // ドロップを許可するための設定
                canvas.ondragover = (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = "copy";
                };
            
                // ドロップ実行時の処理
                canvas.ondrop = (e) => {
                    e.preventDefault();
                    const sId = e.dataTransfer.getData("text/plain");
                    const sourceData = railData[sId];
                    
                    if (sourceData) {
                        const pos = getMousePos(canvas, e);
                        // マウスの先端位置にパーツを新規配置
                        const newPart = {
                            ...sourceData,
                            id: Date.now(),
                            x: pos.x,
                            y: pos.y,
                            rotation: 0
                        };
                        layers.rail.push(newPart);
                        render();
                    }
                };
            }

            /**
             * 指定された座標と回転角における接続点のグローバル座標を算出
             */
            function getConnectorPoints(p, x, y, rotation) {
                const points = [];
                const centerOffset = p.bIsDouble ? (p.nTrackGap / 2) : 0;
                const rad = rotation * Math.PI / 180;
            
                // 1. パーツ内ローカル座標（起点と終点）
                const local = [{ x: 0, y: centerOffset }];
                if (p.sRole === "straight") {
                    local.push({ x: p.nLength, y: centerOffset });
                } else if (p.sRole === "curve" || p.sRole === "approach") {
                    const aRad = p.nAngle * Math.PI / 180;
                    const r = p.nRadius - centerOffset;
                    local.push({
                        x: r * Math.sin(aRad),
                        y: p.nRadius - r * Math.cos(aRad)
                    });
                }
            
                // 2. ローカル座標を現在の回転と位置(x, y)でグローバル座標に変換
                return local.map(pt => ({
                    x: x + (pt.x * Math.cos(rad) - pt.y * Math.sin(rad)),
                    y: y + (pt.x * Math.sin(rad) + pt.y * Math.cos(rad))
                }));
            }

            /**
             * キーボード入力イベント
             * Rキーで 22.5度回転（時計回り）
             */
            window.onkeydown = function(e) {
                // Rキー (大文字・小文字両対応)
                if (e.key === 'r' || e.key === 'R') {
                    // 操作対象のパーツがある場合のみ実行
                    const target = draggedPart || (layers.rail.length > 0 ? layers.rail[layers.rail.length - 1] : null);
                    
                    if (target) {
                        // 現在の角度に 22.5度を加算
                        target.rotation = (target.rotation + 22.5) % 360;
                        
                        // 再描画して回転を反映
                        render();
                        
                        // ページスクロール等のデフォルト動作を防止
                        e.preventDefault();
                    }
                }
            };
            
            // --- マウスイベント ---
            /**
             * マウスダウンイベント（回転を考慮した正確な当たり判定）
             */
            canvas.onmousedown = function(e) {
                const pos = getMousePos(canvas, e);
                
                for (let i = layers.rail.length - 1; i >= 0; i--) {
                    const p = layers.rail[i];
                    const halfView = p.nViewWidth / 2;
                    const centerOffset = p.bIsDouble ? (p.nTrackGap / 2) : 0;
                    
                    // --- 回転を考慮した座標変換（逆回転） ---
                    const rad = -p.rotation * Math.PI / 180; // 逆方向に回す
                    const dxOrig = pos.x - p.x;
                    const dyOrig = pos.y - p.y;
                    
                    // 回転後のマウス位置を、パーツのローカル座標(0度基準)に変換
                    const dx = dxOrig * Math.cos(rad) - dyOrig * Math.sin(rad);
                    const dy = dxOrig * Math.sin(rad) + dyOrig * Math.cos(rad);
            
                    let isHit = false;
                    if (p.sRole === "straight" || p.sRole === "structure" || p.sRole === "furniture") {
                        const yMin = centerOffset - halfView;
                        const yMax = centerOffset + halfView;
                        if (dx >= 0 && dx <= p.nLength && dy >= yMin && dy <= yMax) isHit = true;
                    } else if (p.sRole === "curve" || p.sRole === "approach") {
                        // 曲線判定：中心(0, p.nRadius)からの距離と角度で判定
                        const ry = dy - p.nRadius;
                        const dist = Math.sqrt(dx * dx + ry * ry);
                        const angle = Math.atan2(dx, -ry) * 180 / Math.PI;
            
                        const rOuter = p.nRadius + halfView;
                        const rInner = p.bIsDouble ? (p.nRadius - p.nTrackGap - halfView) : (p.nRadius - halfView);
            
                        if (dist >= rInner && dist <= rOuter && angle >= 0 && angle <= p.nAngle) {
                            isHit = true;
                        }
                    }
            
                    if (isHit) {
                        isDragging = true;
                        draggedPart = p;
            
                        // マウス位置とパーツ起点の相対距離を維持（グローバル座標で保持）
                        dragOffset.x = pos.x - p.x;
                        dragOffset.y = pos.y - p.y;
            
                        layers.rail.push(layers.rail.splice(i, 1)[0]);
                        render();
                        break;
                    }
                }
            };

/**
 * マウス移動イベント（重なり防止・180度反転吸着の実装）
 */
canvas.onmousemove = function(e) {
    if (!isDragging || !draggedPart) return;

    const pos = getMousePos(canvas, e);
    const snapDistance = 25;

    // 1. マウス位置から暫定座標を計算
    let newX = pos.x - dragOffset.x;
    let newY = pos.y - dragOffset.y;

    // 2. スナップ判定（Shiftキー押下時はスキップ）
    if (!e.shiftKey) {
        let snapped = false;
        const selfPoints = getConnectorPoints(draggedPart, newX, newY, draggedPart.rotation);

        for (const other of layers.rail) {
            if (other.id === draggedPart.id) continue;
            const targetPoints = getConnectorPoints(other, other.x, other.y, other.rotation);

            for (let i = 0; i < selfPoints.length; i++) {
                for (let j = 0; j < targetPoints.length; j++) {
                    const sp = selfPoints[i];
                    const tp = targetPoints[j];
                    const dist = Math.sqrt((sp.x - tp.x) ** 2 + (sp.y - tp.y) ** 2);

                    if (dist < snapDistance) {
                        // --- 重なり防止の角度同期ロジック ---
                        
                        // 相手側ジョイナーの「外向き」角度を算出
                        // 起点(j=0)なら反対側(+180)、終点(j=1)なら進行方向(+nAngle)
                        const otherOutwardAngle = other.rotation + (j === 0 ? 180 : (other.nAngle || 0));
                        
                        // 自分側ジョイナーの「起点から見た相対角度（内向き）」を算出
                        // 起点(i=0)ならそのまま(0)、終点(i=1)なら進行方向の逆(+nAngle+180)
                        const selfInwardAngle = (i === 0 ? 0 : ((draggedPart.nAngle || 0) + 180));

                        // 角度を同期：相手の外向き角度に、自分の内向き角度を一致させる
                        // これにより、レール同士が重ならず、必ず「伸びる方向」に繋がります
                        draggedPart.rotation = (otherOutwardAngle - selfInwardAngle + 360) % 360;

                        // 3. 角度確定後に位置を再計算して正確に吸着
                        const updatedSelf = getConnectorPoints(draggedPart, newX, newY, draggedPart.rotation);
                        newX -= (updatedSelf[i].x - tp.x);
                        newY -= (updatedSelf[i].y - tp.y);

                        snapped = true;
                        break;
                    }
                }
                if (snapped) break;
            }
            if (snapped) break;
        }
    }

    // 最終座標の更新
    draggedPart.x = newX;
    draggedPart.y = newY;
    render();
};
        
            window.onmouseup = function() {
                isDragging = false;
                draggedPart = null;
                render(); // 〇を消すために再描画
            };
                    
            /**
             * window.onload を更新
             */
            window.onload = () => {
                init();
                initCanvasEvents(); // ドロップ受付を開始
            };
            
        </script>
    </body>
</html>
