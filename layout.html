<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Railroad Models Layout Designer v.0209a</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #sidebar { width: 250px; background: #2c3e50; color: white; overflow-y: auto; padding: 10px; }
        .rail-item { 
            background: #34495e; margin-bottom: 8px; padding: 10px; border-radius: 4px; 
            cursor: pointer; transition: background 0.2s; font-size: 14px;
        }
        .rail-item:hover { background: #1abc9c; }
        #main { flex: 1; background: #ecf0f1; position: relative; overflow: auto; }
        #canvas { background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: block; margin: 50px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3 style="border-bottom: 1px solid #7f8c8d; padding-bottom: 5px;">パーツリスト</h3>
        <div id="rail-list"></div>
    </div>
    <div id="main">
        <canvas id="canvas"></canvas>
    </div>

    <script src="rails.js"></script>

    <script>
// --- 状態管理 ---
const layers = { rail: [] };
const CANVAS_CONFIG = { width: 5000, height: 5000 };

let isDragging = false, draggedPart = null, offsetX = 0, offsetY = 0, isSnapped = false, isCtrlPressed = false;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

/**
 * 汎用座標変換エンジン
 * 中心点(cx, cy)を基準に、オフセット(ox, oy)を角度angle分回転させた座標を返す
 */
function getTransformedPoint(cx, cy, angleDeg, ox, oy) {
    const rad = (angleDeg * Math.PI) / 180;
    const cos = Math.cos(rad);
    const sin = Math.sin(rad);
    return {
        x: cx + ox * cos - oy * sin,
        y: cy + ox * sin + oy * cos,
        ang: (angleDeg + (ox < 0 ? 180 : 0)) % 360 // 接点の向き（外向き）を簡易計算
    };
}

function init() {
    canvas.width = CANVAS_CONFIG.width;
    canvas.height = CANVAS_CONFIG.height;
    initCanvasEvents();
    initSidebar();
    render();
}

/**
 * 接点取得の統合（単線直線に特化）
 */
function getConnectorPoints(p) {
    const points = [];
    if (p.sRole === "straight") {
        const halfLen = p.nLength / 2;
        // 右端の接点 (オフセット X=halfLen, Y=0)
        points.push(getTransformedPoint(p.x, p.y, p.rotation, halfLen, 0));
        // 左端の接点 (オフセット X=-halfLen, Y=0)
        const left = getTransformedPoint(p.x, p.y, p.rotation, -halfLen, 0);
        left.ang = (p.rotation + 180) % 360; // 左向きに補正
        points.push(left);
    }
    // 曲線等は今後、同様に getTransformedPoint を使って定義可能
    return points;
}

/**
 * サイドバーの生成（2階層ツリー表示 / sNameのみ表示）
 */
function initSidebar() {
    const listContainer = document.getElementById('rail-list');
    if (!listContainer) return;
    listContainer.innerHTML = "";

    if (typeof railData === 'undefined') {
        listContainer.innerHTML = "<p style='color:red;'>rails.js not found</p>";
        return;
    }

    // データをツリー構造に整理 [シリーズ][役割]
    const tree = {};
    Object.entries(railData).forEach(([key, rail]) => {
        const series = rail.sSeries || "Unknown";
        const role = rail.sRole || "Other";
        if (!tree[series]) tree[series] = {};
        if (!tree[series][role]) tree[series][role] = [];
        
        // ドラッグ用IDを保持
        const railWithKey = { ...rail, sId: key };
        tree[series][role].push(railWithKey);
    });

    // 第1階層: シリーズ名
    Object.keys(tree).sort().forEach(seriesName => {
        const seriesDetails = document.createElement("details");
        seriesDetails.style.marginBottom = "5px";
        
        const seriesSummary = document.createElement("summary");
        seriesSummary.style.cursor = "pointer";
        seriesSummary.style.fontWeight = "bold";
        seriesSummary.style.padding = "3px";
        seriesSummary.style.background = "#1a252f";
        seriesSummary.textContent = "[+] " + seriesName;
        
        seriesDetails.appendChild(seriesSummary);

        // 第2階層: 役割 (Role)
        Object.keys(tree[seriesName]).sort().forEach(roleName => {
            const roleDetails = document.createElement("details");
            roleDetails.style.marginLeft = "10px";
            roleDetails.style.marginTop = "2px";
            
            const roleSummary = document.createElement("summary");
            roleSummary.style.cursor = "pointer";
            roleSummary.style.fontSize = "13px";
            roleSummary.style.color = "#1abc9c";
            roleSummary.textContent = "> " + roleName;
            
            roleDetails.appendChild(roleSummary);

            // パーツ一覧
            tree[seriesName][roleName].forEach(rail => {
                const div = document.createElement("div");
                div.className = "rail-item";
                div.style.marginLeft = "10px";
                div.style.cursor = "grab";
                div.draggable = true;
                // 表示を sName のみに限定
                div.textContent = rail.sName;
                
                div.ondragstart = (e) => {
                    e.dataTransfer.setData("text/plain", rail.sId);
                    e.dataTransfer.effectAllowed = "copy";
                };
                roleDetails.appendChild(div);
            });
            seriesDetails.appendChild(roleDetails);
        });

        // 開閉時の記号切り替え
        seriesDetails.addEventListener("toggle", () => {
            seriesSummary.textContent = (seriesDetails.open ? "[-] " : "[+] ") + seriesName;
        });

        listContainer.appendChild(seriesDetails);
    });
}


function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    layers.rail.forEach(part => drawPart(ctx, part));
}

function drawPart(ctx, p) {
    ctx.save();
    // 中心点 (p.x, p.y) で回転
    ctx.translate(p.x, p.y);
    ctx.rotate((p.rotation * Math.PI) / 180);

    if (p.sRole === "straight") {
        drawStraightRail(ctx, p);
    }

    // Ctrlマーカー（中心点）
    if (isCtrlPressed) {
        ctx.beginPath();
        ctx.arc(0, 0, 7.5, 0, Math.PI * 2);
        ctx.fillStyle = (draggedPart === p) ? "#0056b3" : "blue";
        ctx.fill();
        ctx.stroke();
    }
    ctx.restore();
}

function drawStraightRail(ctx, p) {
    const halfLen = p.nLength / 2;
    const halfView = p.nViewWidth / 2;
    const halfGauge = p.nGauge / 2;
    const mainColor = p.sColor || '#333';
    const isDragged = (draggedPart === p);

    // 1. 道床（バラスト）
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = p.sColor || '#999';
    ctx.beginPath();
    ctx.rect(-halfLen, -halfView, p.nLength, p.nViewWidth);
    ctx.fill();
    
    ctx.globalAlpha = 1.0;
    ctx.strokeStyle = isDragged ? (isSnapped ? '#007bff' : '#ff4757') : mainColor;
    ctx.lineWidth = isDragged ? 3 : 1;
    ctx.stroke();

    // 2. レール
    ctx.beginPath();
    ctx.strokeStyle = mainColor;
    ctx.lineWidth = 1;
    // 上下2本のレール
    ctx.moveTo(-halfLen, -halfGauge); ctx.lineTo(halfLen, -halfGauge);
    ctx.moveTo(-halfLen,  halfGauge); ctx.lineTo(halfLen,  halfGauge);
    ctx.stroke();
}

function isPointInPart(mouseX, mouseY, p) {
    // マウス位置を中心に向けた相対座標に変換
    const dx = mouseX - p.x;
    const dy = mouseY - p.y;
    const rad = -(p.rotation * Math.PI / 180);
    const lx = dx * Math.cos(rad) - dy * Math.sin(rad);
    const ly = dx * Math.sin(rad) + dy * Math.cos(rad);

    if (p.sRole === 'straight') {
        return (Math.abs(lx) <= p.nLength / 2 && Math.abs(ly) <= p.nViewWidth / 2);
    }
    return false;
}

function initCanvasEvents() {
    canvas.ondragover = (e) => e.preventDefault();
    canvas.ondrop = (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const sId = e.dataTransfer.getData("text/plain");
        if (railData[sId]) {
            layers.rail.push({ 
                ...railData[sId], id: Date.now(), 
                x: e.clientX - rect.left, y: e.clientY - rect.top, rotation: 0 
            });
            render();
        }
    };

    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        for (let i = layers.rail.length - 1; i >= 0; i--) {
            const p = layers.rail[i];
            if (isPointInPart(mx, my, p)) {
                draggedPart = p; isDragging = true;
                offsetX = mx - p.x; offsetY = my - p.y;
                layers.rail.splice(i, 1); layers.rail.push(p);
                render(); break;
            }
        }
    };

    canvas.onmousemove = (e) => {
        if (!isDragging || !draggedPart) return;
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        // 1. 【本来の位置】を計算（マウスに追従するベース座標）
        const basePosX = mx - offsetX;
        const basePosY = my - offsetY;

        // 判定用に一旦、本来の位置へ仮置きする
        draggedPart.x = basePosX;
        draggedPart.y = basePosY;

        let minD = 20, targetP = null, myIdx = -1;
        // 本来の位置における接点を取得して、近くに他の接点があるか探す
        const myPoints = getConnectorPoints(draggedPart);

        layers.rail.forEach(t => {
            if (t === draggedPart) return;
            const tPoints = getConnectorPoints(t);
            myPoints.forEach((p1, i) => {
                tPoints.forEach(p2 => {
                    const d = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                    if (d < minD) { minD = d; myIdx = i; targetP = p2; }
                });
            });
        });

        if (targetP) {
            // --- 吸着圏内：座標をターゲットに合わせる ---
            const targetAng = (targetP.ang + 180) % 360;
            draggedPart.rotation = (targetAng - (myIdx === 0 ? 0 : 180) + 360) % 360;

            const currentPoints = getConnectorPoints(draggedPart);
            draggedPart.x += (targetP.x - currentPoints[myIdx].x);
            draggedPart.y += (targetP.y - currentPoints[myIdx].y);

            // 吸着した「瞬間」だけオフセットを同期してワープを防止
            if (!isSnapped) {
                offsetX = mx - draggedPart.x;
                offsetY = my - draggedPart.y;
                isSnapped = true; 
            }
        } else { 
            // --- 吸着圏外：ベース座標をそのまま採用 ---
            // マウスが20px圏外に出た瞬間に、素直にここが実行される
            isSnapped = false; 
        }
        render();
    };
    window.onmouseup = () => { isDragging = false; draggedPart = null; render(); };
}

window.onkeydown = (e) => {
    if (e.key.toLowerCase() === 'r') {
        const t = draggedPart || layers.rail[layers.rail.length-1];
        if (t) { t.rotation = (t.rotation + 22.5) % 360; render(); }
    }
    if (e.key === 'Control') { isCtrlPressed = true; render(); }
};
window.onkeyup = (e) => { if (e.key === 'Control') { isCtrlPressed = false; render(); } };

init();
    </script>
</body>
</html>
